                    }
                }
                setGithubModalStatus("リポジトリ " + repos.length + " 件を取得しました。");
            }

            async function startGithubOAuthLogin() {
                if (!githubFeatureEnabled) return;
                if (GITHUB_OAUTH_WORKER_ORIGIN.indexOf("YOUR_WORKER_SUBDOMAIN") !== -1) {
                    alert(
                        "GitHub OAuth Worker の URL がプレースホルダのままです。\n"
                        + "index.html の GITHUB_OAUTH_WORKER_ORIGIN をデプロイ済み Worker オリジンに差し替えてください。\n"
                        + "手順: cloudflare_worker/README.md"
                    );
                    return;
                }

                const state = githubRandomString(32);
                const codeVerifier = githubRandomString(64);
                const codeChallenge = await githubSha256Base64Url(codeVerifier);
                githubOAuthState = state;
                githubOAuthCodeVerifier = codeVerifier;

                const loginUrl = new URL("/auth/login", GITHUB_OAUTH_WORKER_ORIGIN);
                loginUrl.searchParams.set("state", state);
                loginUrl.searchParams.set("code_challenge", codeChallenge);
                loginUrl.searchParams.set("code_challenge_method", "S256");
                loginUrl.searchParams.set("code_verifier", codeVerifier);
                loginUrl.searchParams.set("opener_origin", window.location.origin);

                // ユーザージェスチャ直下で open（ポップアップブロック回避）
                githubOAuthPopup = window.open(
                    loginUrl.toString(),
                    "github_oauth_popup",
                    "width=600,height=720,menubar=no,toolbar=no"
                );
                if (!githubOAuthPopup) {
                    alert("ポップアップがブロックされました。ブラウザの設定で許可してください。");
                    githubOAuthState = null;
                    githubOAuthCodeVerifier = null;
                }
            }

            function handleGithubOAuthMessage(event) {
                // 1) 開いた popup からのメッセージであること
                if (!githubOAuthPopup || event.source !== githubOAuthPopup) {
                    return false;
                }
                // 2) Worker オリジン一致
                if (event.origin !== GITHUB_OAUTH_WORKER_ORIGIN) {
                    console.warn("GitHub OAuth: unexpected origin", event.origin);
                    return true; // 処理済み扱い（無視）
                }
                const data = event.data;
                if (!data || data.type !== "github_oauth_result") {
                    return true;
                }
                // 3) state 一致
                if (!githubOAuthState || data.state !== githubOAuthState) {
                    console.warn("GitHub OAuth: state mismatch");
                    setGithubModalStatus("OAuth state が一致しません。再度ログインしてください。");
                    return true;
                }

                githubOAuthState = null;
                githubOAuthCodeVerifier = null;
                try {
                    if (githubOAuthPopup && !githubOAuthPopup.closed) githubOAuthPopup.close();
                } catch (e) { /* ignore */ }
                githubOAuthPopup = null;

                if (!data.ok || !data.access_token) {
                    // Worker から error 文字列が来る場合は表示（token は含まれない）
                    const errMsg = (data && data.error) ? String(data.error) : "OAuth に失敗しました。";
                    setGithubModalStatus(errMsg);
                    return true;
                }

                // メモリのみ保持（localStorage 等へは書かない）
                githubAccessToken = data.access_token;
                // token 文字列はログに出さない
                console.log("# host_frame_log : GitHub OAuth success (token stored in memory only)");

                (async function () {
                    try {
                        await githubFetchUser();
                        notifyIdeAuthState();
                        refreshGithubModalUi();
                        openGithubModal();
                        await populateRepoSelect();
                    } catch (err) {
                        console.error(err);
                        setGithubModalStatus("ユーザー情報の取得に失敗: " + err.message);
                    }
                })();
                return true;
            }

            /**
             * GitHub ログアウト
             * 1) Worker 経由で OAuth grant を revoke（共有 PC 対策）
             * 2) ホストメモリ上の token を破棄（永続化はしない）
             * 失敗してもメモリは必ずクリアする
             */
            async function logoutGithub() {
                // revoke 用に退避（先に UI から消す）
                const tokenToRevoke = githubAccessToken;

                githubAccessToken = null;
                githubUserLogin = null;
                githubCurrentRepo = null;
                githubOAuthState = null;
                githubOAuthCodeVerifier = null;
                if (githubRepoSelect) {
                    githubRepoSelect.innerHTML = '<option value="">— ログイン後に一覧を取得 —</option>';
                }
                if (githubBranchInput) githubBranchInput.value = "";
                if (githubCommitMessage) githubCommitMessage.value = "";
                notifyIdeAuthState();
                refreshGithubModalUi();

                // Worker 未設定時はメモリ破棄のみ
                if (!tokenToRevoke || GITHUB_OAUTH_WORKER_ORIGIN.indexOf("YOUR_WORKER_SUBDOMAIN") !== -1) {
                    setGithubModalStatus(
                        "ログアウトしました（ローカル token 破棄済み）。"
                        + " 共有PCでは github.com からもログアウトしてください。"
                    );
                    return;
                }

                setGithubModalStatus("GitHub 認可（grant）を取り消し中…");
                let revokeOk = false;
                let revokeDetail = "";
                try {
                    const res = await fetch(GITHUB_OAUTH_WORKER_ORIGIN + "/auth/logout", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Accept": "application/json"
                        },
                        body: JSON.stringify({ access_token: tokenToRevoke })
                    });
                    let data = null;
                    try {
                        data = await res.json();
                    } catch (parseErr) {
                        data = null;
                    }
                    revokeOk = !!(res.ok && data && data.ok);
                    if (!revokeOk) {
                        revokeDetail = (data && (data.error || data.detail))
                            ? String(data.error || data.detail)
                            : ("HTTP " + res.status);
                    }
                } catch (err) {
                    revokeDetail = err && err.message ? err.message : String(err);
                    console.warn("GitHub grant revoke failed:", revokeDetail);
                }

                // token 文字列はログ・UI に出さない
                if (revokeOk) {
                    setGithubModalStatus(
                        "ログアウトしました（grant 取り消し済み）。"
                        + " 共有PCでは github.com からもログアウトしてください。"
                    );
                } else {
                    setGithubModalStatus(
                        "ログアウトしました（ローカル token は破棄済み。"
                        + " grant 取り消しは失敗: " + (revokeDetail || "unknown") + "）。"
                        + " 必要なら github.com/settings/applications で手動 revoke してください。"
                    );
                }
            }

            async function openSelectedGithubRepo() {
                if (!githubAccessToken) return;
                const full = githubRepoSelect && githubRepoSelect.value;
                if (!full || full.indexOf("/") === -1) {
                    setGithubModalStatus("リポジトリを選択してください。");
                    return;
                }
                const parts = full.split("/");
                const owner = parts[0];
                const repo = parts.slice(1).join("/");
                const branch = (githubBranchInput && githubBranchInput.value.trim())
                    || (githubRepoSelect.selectedOptions[0] && githubRepoSelect.selectedOptions[0].dataset.defaultBranch)
                    || "main";

                setGithubModalStatus("ツリーを取得中: " + full + " @ " + branch);
                try {
                    const result = await githubFetchRepoTree(owner, repo, branch);
                    githubCurrentRepo = { owner, repo, branch, defaultBranch: branch };
                    refreshGithubModalUi();
                    postToIdeGithub({
                        cmd: "github_repo_tree",
                        owner,
                        repo,
                        branch,

            class Serial_port_manager {
                constructor() {
                    this.port = null;
                    this.reader = null;
                    this.writer = null;
                    this.keep_reading = false;
                    this.read_promise = null;
                    this.last_temp = 400
                }

                // ポート選択と接続
                async serial_connect(options = { baudRate: 9600, dataBits: 8, parity: "none", stopBits: 1 }) {
                    if (!navigator.serial) throw new Error("Web Serial API not supported");

                    // ユーザーによるポート選択 (要ユーザージェスチャー)
                    this.port = await navigator.serial.requestPort();
                    await this.port.open(options);

                    // 受信ループの開始
                    this.keep_reading = true;
                    this.read_promise = this.read_loop();
                    return "Connected";
                }

                // 受信ループ (バックグラウンドで常に待機)
                async read_loop() {
                    while (this.port && this.port.readable && this.keep_reading) {
                        this.reader = this.port.readable.getReader();
                        try {
                            while (true) {
                                const { value, done } = await this.reader.read();
                                if (done) break;
                                if (value) {
                                    // 受信した生データをそのままIframe (Python) へ転送
                                    // postMessageはStructured Cloneに対応しているためUint8Arrayをそのまま送れる
                                    frame.contentWindow.postMessage({
                                        cmd: "serial_rx",
                                        data: value
                                    }, "*");
                                }
                            }
                        } catch (error) {
                            console.error("Serial Read Error:", error);
                        } finally {
                            this.reader.releaseLock();
                        }
                    }
                }

                // 切断処理
                async serial_disconnect() {
                    this.keep_reading = false;
                    if (this.reader) {
                        await this.reader.cancel();
                    }
                    if (this.read_promise) {
                        await this.read_promise;
                    }
                    if (this.port) {
                        await this.port.close();
                        this.port = null;
                    }
                    return "Disconnected";
                }

                // データ送信 (Pythonから受け取ったByte配列を書き込む)
                async serial_write(data_array) {
                    //if (!this.port || !this.port.writable) throw new Error("Port not writable");
                    if (!this.port || !this.port.writable) {
                        return this.dummy_response(data_array);
                    }

                    const writer = this.port.writable.getWriter();
                    try {
                        // Uint8Arrayとして書き込み
                        await writer.write(new Uint8Array(data_array));
                    } finally {
                        writer.releaseLock();
                    }
                    return "Sent";
                }

                calculate_crc(data) {
                    let crc = 0xFFFF;
                    for (let pos = 0; pos < data.length; pos++) {
                        crc ^= data[pos]; // XOR byte into least sig. byte of crc
                        for (let i = 8; i !== 0; i--) { // Loop over each bit
                            if ((crc & 0x0001) !== 0) {
                                crc >>= 1; // Shift right and XOR 0xA001
                                crc ^= 0xA001;
                            } else {
                                crc >>= 1;
                            }
                        }
                    }
                    return [crc & 0xFF, (crc >> 8) & 0xFF]; // Return the CRC as an array
                }

                dummy_response(request_data) {
                    console.log("// dummy Modbus フレームを作成");
                    const add_num = [0x00, 0x02, 0x03, 0x04, 0x05, 0x06, 0x07, 0x08, 0x09, 0x0A, 0x0B, 0x0C, 0x0D, 0x0E, 0x0F, 0x10, 0x11, 0x16, 0x17][11]; // アドレス
                    const request_base = new Uint8Array([0x01, 0x03, 0x00, add_num, 0x00, 0x01]); // [0x01, 0x03, 0x00, 0x0B, 0x00, 0x01, 0xF5, 0xC8]
                    const crc = SPM.calculate_crc(request_base);
                    const request = new Uint8Array([...request_base, ...crc]);
                    let buffer_array = []; // 受信データを蓄積するバッファ
                    let res_crc = new Uint8Array([0x00, 0x00]);
                    let base_array = new Uint8Array([0x01, 0x03, 0x02]);
                    const random_num = Math.floor(Math.random() * 3) - 1
                    this.last_temp = Math.round(this.last_temp + random_num);
                    const new_temp_10 = this.last_temp;
                    const byte1 = ((new_temp_10 >> 8) & 0xFF).toString(16); // 上位バイト
                    const byte2 = (new_temp_10 & 0xFF).toString(16); // 下位バイト
                    let new_temp_array = new Uint8Array([parseInt(byte1, 16), parseInt(byte2, 16)]);
                    let add_array = SPM.calculate_crc(new Uint8Array([...base_array, ...new_temp_array]));
                    if (Math.random() < 0.15) { // 指定の確率でベース配列を改変
                        base_array = new Uint8Array([0x01, 0x02]);
                    }
                    if (Math.random() < 0.15) { // 指定の確率で温度配列を改変
                        new_temp_array = new Uint8Array([0x01]);

                    if (Math.random() < 0.15) { // 指定の確率でCRC配列を改変
                        add_array = new Uint8Array([0x01, 0x03]);

                    if (Math.random() < 0.05) { // 指定の確率で34℃配列に上書き

                        const dummy_byte1 = ((dummy_temp_10 >> 8) & 0xFF).toString(16); // 上位バイト
                        const dummy_byte2 = (dummy_temp_10 & 0xFF).toString(16); // 下位バイト
                        new_temp_array = new Uint8Array([parseInt(dummy_byte1, 16), parseInt(dummy_byte2, 16)]);
                        add_array = SPM.calculate_crc(new Uint8Array([...base_array, ...new_temp_array]))
                    }
                    const response = new Uint8Array([...base_array, ...new_temp_array, ...add_array]);

                    // 実際の通信を模して、グローバルの受信バッファにプッシュする
                    // これにより Python 側の定期実行処理が「データが届いた」と誤認して処理を開始できる

            //-------------------------------------------------------- ### Gemini Nano Local Agent Management ###

                resetUiToReady() {

                        this.sendBtn.textContent = "送信";
                        this.sendBtn.style.backgroundColor = "#007acc";

                // UI要素にイベントリスナーを登録
                initializeEvents() {
                    if (this.resetBtn) {
                        this.resetBtn.addEventListener("click", () => this.resetSession());
                    }

                    // 送信ボタンのクリックイベント
                    this.sendBtn.addEventListener("click", () => {
                        if (this.isGenerating) {
                            this.handleAbort(); // 生成中の場合は中断処理を実行
                        } else {
                            this.handleSend();  // 通常時は送信処理を実行
                        }
                    });

                    // テキストエリアでのEnterキー押下（Shift+Enterで改行）
                    this.userInput.addEventListener("keydown", (e) => {
                        if (e.key === "Enter" && !e.shiftKey) {
                            e.preventDefault();
                            this.handleSend();
                        }
                    });
                }

                // AIの応答生成を強制中断する処理
                handleAbort() {
                    if (this.abortController) {
                        this.abortController.abort(); // 中断シグナルを発火
                        console.log("[Gemini Nano] Generation aborted by user.");
                    }
                }

                // ユーザーメッセージの送信処理およびAI応答のストリーミング制御
                async handleSend() {
                    const text = this.userInput.value.trim();
                    if (!text) return;

                    // 初回送信時はセッションの起動処理を優先する（送信ボタンが起動処理を兼ねる）
                    if (this.isFirstSession) {
                        this.appendMessage(text, "user"); // 最初の指示をチャット欄へ表示
                        this.userInput.value = "";
                        
                        // 最初の指示を引数として渡し、システムプロンプトに埋め込んで起動
                        const isStarted = await this.startLocalAI(text);
                        if (!isStarted) return; // デバイスが未対応、モデル未ダウンロードなどの場合は処理を遮断
                        
                        this.isFirstSession = false; // 起動に成功したため初回フラグを解除
                        
                        // 確立されたセッションに対して、最初の指示の処理を実行させる
                        await this.executeFirstPrompt(text);
                        return;
                    }

                    if (!this.aiSession) return;

                    // 2回目以降の通常のメッセージ送信処理
                    this.appendMessage(text, "user");
                    this.userInput.value = "";

                    // 先に要約を生成・画面表示する（これによりサマリーが上に表示される）
                    const summary = await this.generateSummary();

                    // AIの応答用プレースホルダーを生成（サマリーの後に生成されるため下に配置される）
                    const aiMsgDiv = this.appendMessage("...", "ai", false);

                    // 応答中の状態を設定し、UIを「中断」モードへ切り替える
                    this.isGenerating = true;
                    const controller = new AbortController();
                    this.abortController = controller;

                    this.userInput.disabled = true;
                    this.sendBtn.textContent = "中断";
                    this.sendBtn.style.backgroundColor = "#d9534f"; // 警告カラー（赤）に変更
                    this.sendBtn.disabled = false;

                    try {
                        // 送信直前に最新の会話要約（State）を生成・更新
                        const summary = await this.generateSummary();

                        // 要約が存在する場合はプロンプトの先頭にコンテキストとしてインジェクト
                        const combinedPrompt = summary
                            ? `[現在のタイムライン・文脈要約]\n${summary}\n\n[ユーザーからの新しい指示]\n${text}`
                            : text;

                        // 構築したコンプライド・プロンプトでストリーミングを実行
                        const stream = this.aiSession.promptStreaming(combinedPrompt, { signal: this.abortController.signal });

                        // 最初のローディング表示「...」をクリア
                        aiMsgDiv.textContent = "";

                        if (aiMsgDiv.textContent.trim()) {

                    } finally {
                        // 状態のリセットとUIを通常モードへ戻す処理
                        if (this.abortController === controller) {
                            this.isGenerating = false;
                            this.abortController = null;

                            this.userInput.disabled = false;
                            this.sendBtn.textContent = "送信";

                // 起動成功直後に、システムプロンプトの「# 目的」に刻まれた最初の指示を自律駆動させるための関数
                async executeFirstPrompt(firstText) {
                    const aiMsgDiv = this.appendMessage("...", "ai", false);

                    this.isGenerating = true;
                    const controller = new AbortController();
                    this.abortController = controller;

                    this.userInput.disabled = true;
                    this.sendBtn.textContent = "中断";
                    this.sendBtn.style.backgroundColor = "#d9534f"; // 警告カラー（赤）
                    this.sendBtn.disabled = false;

                    try {
                        // 最初のタスクは既にシステムプロンプトの目的セクションに固定されているため、
                        // AIに対して目的の実行を開始するようトリガーを引きます
                        const stream = this.aiSession.promptStreaming(`私の最初の指示（システムプロンプトの目的セクションに記載したもの）に従って、自律タスクを開始してください。指示内容: ${firstText}`, { signal: this.abortController.signal });

                        aiMsgDiv.textContent = "";

                        for await (const chunk of stream) {

                            this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
                        }

                        if (aiMsgDiv.textContent.trim()) {
                            this.pendingLogs.push({ role: "ai", content: aiMsgDiv.textContent });
                        }

                        // 出力されたコード/JSONコマンドを解析して実行
                        this.parseAndExecuteCommand(aiMsgDiv.textContent);
                    } catch (error) {
                        console.error("Gemini Nano First Stream Error:", error);
                        if (error.name === "AbortError") {
                            aiMsgDiv.textContent = "⚠️ ユーザーによって自律ループが中断されました。";

                    } finally {
                        if (this.abortController === controller) {
                            this.isGenerating = false;
                            this.abortController = null;

                            this.userInput.disabled = false;
                            this.sendBtn.textContent = "送信";

                // チャット画面へのメッセージ追加ヘルパー

                        msgDiv.style.alignSelf = "flex-start";
                        msgDiv.style.borderLeft = "4px solid #28a745"; // システムからの応答と識別しやすくするための左線
                    } else if (sender === "summary") {

                        msgDiv.style.color = "#8ab4f8";
                        msgDiv.style.alignSelf = "flex-start";
                        msgDiv.style.borderLeft = "4px solid #b48ead"; // 要約と識別しやすくするためのパープルの左線
                    } else {
                        msgDiv.style.backgroundColor = "#333";

                    this.chatContainer.scrollTop = this.chatContainer.scrollHeight;

                async startLocalAI(firstInstruction = "") {

- 貴方はChromeブラウザに組み込まれた軽量ローカルLLMの Gemini nano です

                    } else {

                    }

                    // UI要素の状態を「起動中」に切り替え、二重入力をガード
                    this.isGenerating = true;

                    this.sendBtn.textContent = "起動中";
                    this.updateStatus("🔄 起動中...", "orange");

                    // 各種 Prompt API のファクトリチェック
                    const aiAPI = window.LanguageModel ||
                                  (window.ai && window.ai.languageModel) ||
                                  (window.ai && window.ai.assistant);

                    // Summarizer API のファクトリチェック (新仕様にアップデート)
                    const summarizerAPI = window.Summarizer || (window.ai && window.ai.summarizer);

                    if (!aiAPI) {
                        this.updateStatus("❌ 利用不可", "red");
                        alert("お使いのブラウザ、またはデバイスでは Prompt API がサポートされていません。\nChrome v127以上、かつ必要なコンポーネントが有効であることを確認してください。");
                        this.resetUiToReady();
                        return false;
                    }

                    try {
                        // デバイスでのモデルの利用可能性（ダウンロード状況）を厳密にチェック
                        let availability = "no";
                        if (typeof aiAPI.availability === "function") {
                            availability = await aiAPI.availability();
                        } else if (typeof aiAPI.capabilities === "function") {
                            const caps = await aiAPI.capabilities();
                            availability = caps.available;
                        }
                        
                        console.log("[Gemini Nano Init] availability:", availability);
                        
                        // 利用可能状態を表す文字列（"readily" または "available"）と、DL中（"after-download"）のいずれにも該当しない場合のみガードをかける
                        if (availability !== "readily" && availability !== "available" && availability !== "after-download") {
                            this.updateStatus("❌ 利用不可", "red");
                            alert(`Gemini Nano モデルが現在利用できません（現在の状態: ${availability}）。\nモデルプロセスがクラッシュしているか、ブラウザ側で一時的にブロックされています。\nブラウザを再起動するか、別のタブで開き直してください。`);
                            this.resetUiToReady();
                            return false;
                        } else if (availability === "after-download") {
                            // モデルがまだデバイスにダウンロードされていない場合の処理
                            this.updateStatus("🔄 モデルDL中...", "orange");
                            alert("Gemini Nanoモデルのダウンロードがバックグラウンドで開始されました。\nダウンロードには数分かかります。完了するまでしばらくお待ちいただいた後、再度送信をお試しください。");
                            this.resetUiToReady();
                            return false; // ダウンロード未完了のため、安全に処理をここでブロックして中断する
                        } else {
                            this.updateStatus("🔄 セッション作成中...", "orange");
                        }

                        // 重複指定や未知のプロパティ（outputLanguage等）による内部パニック（InvalidStateError）を完全に防ぐため、
                        // 過去のバージョンで最も安定動作していたレガシー形式（initialPromptsのみ）にオプション構造を一本化します。
                        const sessionOptions = {

                        // --- 1. Prompt API (LanguageModel) の初期化 ---
                        try {
                            this.aiSession = await aiAPI.create({
                                ...sessionOptions,
                                monitor: (m) => {
                                    m.addEventListener("downloadprogress", (e) => {

                                            this.updateStatus(`🔄 DL中... ${progress}%`, "orange");
                                        }
                                    });
                                }
                            });

                            this.aiSession = await aiAPI.create(sessionOptions);

                            }

                        }

                        this.updateStatus("🟢 準備完了", "green");
                        if (this.langSelect) {
                            this.langSelect.disabled = true; // セッション作成後は言語変更を無効化
                        }
                        this.sendBtn.disabled = false;
                        this.userInput.disabled = false;
                        return true; // 初期化成功信号を返却

                    } catch (error) {
                        console.error("Gemini Nano Init Error:", error);
                        this.updateStatus("❌ 起動失敗", "red");
                        const errMessage = String(error);
                        // ブラウザ側のAIプロセス強制ロック（クラッシュ超過）を固有エラーとして綺麗に捕捉
                        if (errMessage.includes("crashed too many times")) {
                            alert("【致命的なエラー】ブラウザ内部のAIモデルプロセスが短時間に何度もクラッシュしたため、Chromeのセキュリティ制限によりNanoの起動がロックされました。\n\nこれを解決するには、Chromeのウィンドウ（すべてのタブ）を一度完全に閉じて再起動するか、PCを再起動した後に再度お試しください。");
                        } else {
                            alert(`セッション作成に失敗しました。\n理由: ${error.message}\nchrome://components で Optimization Guide が「New」になっているか確認してください。`);
                        }
                        this.resetUiToReady();
                        return false; // 初期化失敗信号を返却
                    }
                }

                // セッションおよびチャット表示のリセット処理
                async resetSession() {
                    const confirmReset = confirm("セッションをリセットして、チャット履歴を消去しますか？");
                    if (!confirmReset) return;

                    // 既存のAIセッションが構築されていれば明示的に破棄
                    if (this.aiSession) {
                        try {
                            if (typeof this.aiSession.destroy === "function") {
                                this.aiSession.destroy();
                            }
                        } catch (error) {
                            console.warn("Gemini Nano: Failed to destroy session", error);
                        }
                        this.aiSession = null;
                    }

                // ステータス表示の更新ヘルパー
                updateStatus(text, color) {

                // 蓄積された会話ログから指定フォーマットの要約を非同期生成する関数
                async generateSummary() {
                    console.log("[Summarizer Debug] generateSummary() called.");
                    console.log("[Summarizer Debug] pendingLogs length:", this.pendingLogs.length);
                    console.log("[Summarizer Debug] summarizerSession exists?:", !!this.summarizerSession);

                    // Summary modeがOFFの場合は要約を生成せず、蓄積バッファをクリアして空文字を返す
                    if (this.summaryToggle && !this.summaryToggle.checked) {
                        console.log("[Summarizer] Summary mode is disabled by toggle.");
                        this.pendingLogs = []; 
                        return "";
                    }

                    if (!this.summarizerSession || this.pendingLogs.length === 0) {
                        console.log("[Summarizer Debug] Skipping summary generation. Returning currentSummary.");
                        return this.currentSummary; // 変化がない場合は現在の要約をそのまま返す
                    }

                    // バッファにある未要約ログをテキスト化
                    const newRawLog = this.pendingLogs.map(log => {

                        return `[${speaker}]: ${log.content}`;

                    const promptForSummary = `

${this.currentSummary || "なし（これが最初の会話です）"}

[追加された会話履歴]
${newRawLog}`;

                    try {

                        console.log("[Summarizer Debug] Executing summarize()...");
                        const updatedSummary = await this.summarizerSession.summarize(promptForSummary);
                        console.log("[Summarizer Debug] --- Output from Summarizer ---\n", updatedSummary);

                        // メモリ効率のため、要約が成功したらバッファをクリアして状態を更新
                        this.pendingLogs = [];
                        this.currentSummary = updatedSummary;

                        // 要約結果をチャット欄に表示（senderに "summary" を指定して無限ループを防止）
                        this.appendMessage(`📝 【会話タイムライン要約】\n${updatedSummary}`, "summary");

                        return this.currentSummary;
                    } catch (error) {

                    }

                // AIの出力テキストからJSONオブジェクトを抽出するヘルパー関数
                extractJsonObjects(text) {
                    const results = [];
                    let braceStack = 0;
                    let startIndex = null;
                    let inString = false;
                    let isEscaped = false;

                    for (let i = 0; i < text.length; i++) {
                        const char = text[i];
                        if (inString) {
                            if (isEscaped) {
                                isEscaped = false;
                            } else if (char === "\\") {
                                isEscaped = true;
                            } else if (char === '"') {
                                inString = false;
                            }
                        } else {
                            if (char === '"') {
                                inString = true;
                            } else if (char === "{") {
                                if (braceStack === 0) {
                                    startIndex = i;
                                }
                                braceStack++;
                            } else if (char === "}") {
                                if (braceStack > 0) {
                                    braceStack--;
                                    if (braceStack === 0 && startIndex !== null) {
                                        const potentialJson = text.substring(startIndex, i + 1);
                                        try {
                                            JSON.parse(potentialJson);
                                            results.push(potentialJson);
                                        } catch (e) {
                                            console.warn("Gemini Nano: Invalid JSON block skipped");
                                        }
                                        startIndex = null;
                                    }
                                }
                            }
                        }
                    }
                    return results;
                }

                // 抽出したコマンドを解析し、適切なシステム処理を実行するメソッド
                parseAndExecuteCommand(text) {
                    // エージェントモードOFF時はコマンド解析やエラー通知を一切行わず終了
                    if (this.agentToggle && !this.agentToggle.checked) {
                        return;
                    }

                    const commandData = parseAgentResponse(text);

                    // 連続エラーカウントをチェック
                    if (trackAgentResponseStatus(commandData.cmd)) {
                        alert("【エージェント停止】有効なJSONコマンドが3回連続で検出されなかったため、自律ループを自動停止しました。");
                        this.appendMessage("🛑 3回連続でコマンド非検出、または構文エラーが続いたため、自律ループを強制停止しました。指示内容を見直してください。", "system");
                        return; // ここで処理を遮断し、自動フィードバックループを止めます
                    }

                    try {
                        // 独自のif文分岐やエラーハンドリングを削除し、すべて共通関数に処理を委譲
                        executeAgentCommand(commandData, "NANO");
                    } catch (error) {
                        console.error("Command execution error:", error);
                    }
                }

                // システムの動作結果（フィードバック）をAIに自動送信して自律ループを回すメソッド
                async sendSystemFeedback(feedbackText) {
                    if (!this.aiSession) return;

                    // システムからのフィードバック内容（応答）をチャット欄に表示
                    this.appendMessage(feedbackText, "system");

                    // エージェントモードがオフの場合は自律ループ（自動返信）を行わずここで終了
                    if (this.agentToggle && !this.agentToggle.checked) {
                        return;
                    }

                    // 自律ループ駆動の直前に最新の要約（State）を生成・更新して画面表示
                    const summary = await this.generateSummary();

                    // AI出力用のプレースホルダーをUI（チャットサイドバー）に反映（サマリーの後に生成）
                    const aiMsgDiv = this.appendMessage("...", "ai", false);

                    // 応答中の状態を設定し、UIを「中断」モードへ切り替える
                    this.isGenerating = true;
                    const controller = new AbortController();
                    this.abortController = controller;

                    this.userInput.disabled = true;
                    this.sendBtn.textContent = "中断";
                    this.sendBtn.style.backgroundColor = "#d9534f"; // 警告カラー（赤）に変更
                    this.sendBtn.disabled = false;

                    try {
                        // 要約が存在する場合はシステムフィードバックの先頭に文脈としてドッキング
                        const combinedFeedback = summary
                            ? `[現在のタイムライン・文脈要約]\n${summary}\n\n[システムからの新しい実行結果]\n${feedbackText}`
                            : feedbackText;

                        // 構築したコンパウンド・フィードバックで自律ループのストリーミングを実行
                        const stream = this.aiSession.promptStreaming(combinedFeedback, { signal: this.abortController.signal });
                        aiMsgDiv.textContent = "";
                        for await (const chunk of stream) {
                            aiMsgDiv.textContent += chunk;
                            this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
                        }
                        // ループを継続するために、新たな出力に対して再度コマンド解析を実行
                        this.parseAndExecuteCommand(aiMsgDiv.textContent);
                    } catch (error) {
                        console.error("Gemini Nano Loop Stream Error:", error);
                        // 中断起因の例外（AbortError）かどうかを判定してメッセージを出し分ける
                        if (error.name === "AbortError") {
                            aiMsgDiv.textContent = "⚠️ ユーザーによって自律ループが中断されました。";
                            aiMsgDiv.style.color = "orange";
                        } else {
                            aiMsgDiv.textContent = "⚠️ エラーが発生しました。ループを維持できませんでした。";
                            aiMsgDiv.style.color = "red";
                        }
                    } finally {
                        // 状態のリセットとUIを通常モードへ戻す処理
                        if (this.abortController === controller) {
                            this.isGenerating = false;
                            this.abortController = null;

                            this.userInput.disabled = false;
                            this.sendBtn.textContent = "送信";
                            this.sendBtn.style.backgroundColor = "#007acc"; // 元のテーマカラー（青）に戻す
                            this.sendBtn.disabled = false;
                        }
                    }
                }
            }

            // ページロード完了時に Gemini Nano マネージャーをインスタンス化して起動
            const GNM = new GeminiNanoManager();
            GNM.initializeEvents();

            //-------------------------------------------------------- ### 外部 DnD（ホスト側代理読み取り: VFS / Script マルチゾーン） ###
            // sandbox iframe (null origin) では DirectoryEntry が EncodingError になるため、
            // ホスト document が drop を受け、ファイルを読んで IDE へ postMessage する。
            //
            // 重要:
            // - DataTransfer は drop イベントの同期区間でスナップショットすること
            // - オーバーレイはアクティブゾーンに追従
            // - iframe は capture 中 pointer-events: none にしてホストへイベントを通す
            const hostExplorerDropOverlay = document.createElement("div");
            hostExplorerDropOverlay.id = "host_vfs_drop_overlay"; // 既存 CSS を流用
            hostExplorerDropOverlay.title = "Drop files/folders";
            document.body.appendChild(hostExplorerDropOverlay);

            // zone ごとの矩形（IDE 内座標）と書き込み先パス
            const hostDropZones = {
                vfs: { rect: null, targetPath: "/mnt/vfs_root", defaultPath: "/mnt/vfs_root" },
                script: { rect: null, targetPath: "", defaultPath: "" }
            };
            let hostActiveDropZone = null; // "vfs" | "script" | null
            let hostDropCaptureActive = false;
            let hostDropProcessing = false;

            function hostHasExternalFiles(event) {
                const types = Array.from((event.dataTransfer && event.dataTransfer.types) || []);
                // IDE 内部移動はホストが触らない
                if (types.includes("application/vfs-path")) return false;
                if (types.includes("application/script-path")) return false;
                return types.includes("Files") || types.includes("public.file-url") || types.includes("text/uri-list");
            }

            function hostGetZoneScreenRect(zoneName) {
                const z = hostDropZones[zoneName];
                if (!z || !z.rect || !frame) return null;
                const ir = frame.getBoundingClientRect();
                const r = z.rect;
                return {
                    left: ir.left + r.left,
                    top: ir.top + r.top,
                    right: ir.left + r.left + r.width,
                    bottom: ir.top + r.top + r.height,
                    width: r.width,
                    height: r.height
                };
            }

            /** 画面座標が乗っているゾーン名を返す（script → vfs の順で判定） */
            function hostFindZoneAtPoint(clientX, clientY) {
                const order = ["script", "vfs"];
                for (let i = 0; i < order.length; i++) {
                    const name = order[i];
                    const zone = hostGetZoneScreenRect(name);
                    if (!zone) continue;
                    if (clientX >= zone.left && clientX <= zone.right &&
                        clientY >= zone.top && clientY <= zone.bottom) {
                        return name;
                    }
                }
                return null;
            }

            function hostPositionDropOverlay(zoneName) {
                const zone = hostGetZoneScreenRect(zoneName || hostActiveDropZone);
                if (!zone) return;
                hostExplorerDropOverlay.style.left = `${zone.left}px`;
                hostExplorerDropOverlay.style.top = `${zone.top}px`;
                hostExplorerDropOverlay.style.width = `${zone.width}px`;
                hostExplorerDropOverlay.style.height = `${zone.height}px`;
                hostExplorerDropOverlay.title = (zoneName || hostActiveDropZone) === "script"
                    ? "Drop files/folders to Script_Explorer"
                    : "Drop files/folders to VFS";
            }

            function hostStartDropCapture(zoneName) {
                if (!zoneName || !hostDropZones[zoneName] || !hostDropZones[zoneName].rect) return;
                hostActiveDropZone = zoneName;
                hostDropCaptureActive = true;
                hostPositionDropOverlay(zoneName);
                hostExplorerDropOverlay.classList.add("active");
                // iframe が drop を奪うと sandbox 内で Entry API が失敗するため無効化
                if (frame) {
                    frame.style.pointerEvents = "none";
                }
            }

            function hostEndDropCapture() {
                hostDropCaptureActive = false;
                hostActiveDropZone = null;
                hostExplorerDropOverlay.classList.remove("active");
                hostDropZones.vfs.targetPath = hostDropZones.vfs.defaultPath;
                hostDropZones.script.targetPath = hostDropZones.script.defaultPath;
                if (frame) {
                    frame.style.pointerEvents = "";
                }
            }

            /**
             * drop を処理する共通入口。
             * document キャプチャが先に走るため、二重処理は hostDropProcessing で防ぐ。
             */
            function hostOnExplorerDropEvent(e) {
                if (!hostHasExternalFiles(e)) return false;

                // 座標判定 → 失敗時は直前のアクティブゾーン（オーバーレイ drop 等）
                let zoneName = hostFindZoneAtPoint(e.clientX, e.clientY) || hostActiveDropZone;
                if (!zoneName) return false;

                // ★ 同期区間で必ずスナップショット（await 前）
                e.preventDefault();
                e.stopPropagation();
                const snapshot = hostSnapshotDataTransfer(e.dataTransfer);
                const zoneState = hostDropZones[zoneName];
                const targetPath = (zoneState && zoneState.targetPath != null)
                    ? zoneState.targetPath
                    : (zoneState ? zoneState.defaultPath : "");

                console.log("# host explorer drop snapshot:", {
                    zone: zoneName,
                    items: snapshot.itemCount,
                    entries: snapshot.entries.length,
                    handles: snapshot.handlePromises.length,
                    files: snapshot.fileListCount,
                    types: snapshot.types,
                    targetPath
                });

                hostEndDropCapture();
                hostProcessExplorerDrop(snapshot, zoneName, targetPath);
                return true;
            }

            /** DirectoryEntry の子を全件取得（readEntries は分割返却） */
            function hostReadAllDirectoryEntries(directoryEntry) {
                return new Promise((resolve, reject) => {
                    const reader = directoryEntry.createReader();
                    const allEntries = [];
                    const readBatch = () => {
                        reader.readEntries((batch) => {
                            if (!batch || batch.length === 0) {
                                resolve(allEntries);
                                return;
                            }
                            allEntries.push(...batch);
                            readBatch();
                        }, reject);
                    };
                    readBatch();
                });
            }

            /** 旧 FileSystemEntry から相対パス付きファイルを再帰収集 */
            async function hostCollectFilesFromEntry(entry, pathPrefix) {
                const results = [];
                if (!entry) return results;

                if (entry.isFile) {
                    const file = await new Promise((resolve, reject) => {
                        entry.file(resolve, reject);
                    });
                    const relativePath = pathPrefix ? `${pathPrefix}/${entry.name}` : entry.name;
                    results.push({ file, relativePath });
                    return results;
                }

                if (entry.isDirectory) {
                    const nextPrefix = pathPrefix ? `${pathPrefix}/${entry.name}` : entry.name;
                    let childEntries = [];
                    try {
                        childEntries = await hostReadAllDirectoryEntries(entry);
                    } catch (err) {
                        console.warn("Host directory read failed:", entry.name, err);
                        throw err;
                    }
                    if (childEntries.length === 0) {
                        results.push({ file: null, relativePath: nextPrefix, isDirectory: true });
                        return results;
                    }
                    for (const child of childEntries) {
                        const nested = await hostCollectFilesFromEntry(child, nextPrefix);
                        results.push(...nested);
                    }
                }
                return results;
            }

            /** 新 FileSystemHandle から相対パス付きファイルを再帰収集 */
            async function hostCollectFilesFromHandle(handle, pathPrefix) {
                const results = [];
                if (!handle) return results;

                if (handle.kind === "file") {
                    const file = await handle.getFile();
                    const relativePath = pathPrefix ? `${pathPrefix}/${handle.name}` : handle.name;
                    results.push({ file, relativePath });
                    return results;
                }

                if (handle.kind === "directory") {
                    const nextPrefix = pathPrefix ? `${pathPrefix}/${handle.name}` : handle.name;
                    let childCount = 0;
                    for await (const [name, child] of handle.entries()) {
                        childCount++;
                        const nested = await hostCollectFilesFromHandle(child, nextPrefix);
                        results.push(...nested);
                    }
                    if (childCount === 0) {
                        results.push({ file: null, relativePath: nextPrefix, isDirectory: true });
                    }
                }
                return results;
            }

            /**
             * drop イベントの同期区間で DataTransfer をスナップショットする
             * （await 後は items/files が空になるブラウザがある）
             */
            function hostSnapshotDataTransfer(dataTransfer) {
                const snapshot = {
                    entries: [],
                    handlePromises: [],
                    files: [],
                    itemCount: 0,
                    fileListCount: 0,
                    types: []
                };
                if (!dataTransfer) return snapshot;

                try {
                    snapshot.types = Array.from(dataTransfer.types || []);
                } catch (e) { /* ignore */ }

                const items = dataTransfer.items;
                if (items && items.length > 0) {
                    snapshot.itemCount = items.length;
                    for (let i = 0; i < items.length; i++) {
                        const item = items[i];
                        if (item.kind && item.kind !== "file") continue;

                        // 1) 旧 Entry API（同期で Entry を取得）
                        try {
                            if (typeof item.webkitGetAsEntry === "function") {
                                const entry = item.webkitGetAsEntry();
                                if (entry) snapshot.entries.push(entry);
                            }
                        } catch (err) {
                            console.warn("webkitGetAsEntry failed:", err);
                        }

                        // 2) 新 File System Access API（Promise は同期区間で開始）
                        try {
                            if (typeof item.getAsFileSystemHandle === "function") {
                                snapshot.handlePromises.push(
                                    item.getAsFileSystemHandle().catch((err) => {
                                        console.warn("getAsFileSystemHandle failed:", err);
                                        return null;
                                    })
                                );
                            }
                        } catch (err) {
                            console.warn("getAsFileSystemHandle call failed:", err);
                        }

                        // 3) 単体 File（フォルダの場合は null になりうる）
                        try {
                            if (typeof item.getAsFile === "function") {
                                const file = item.getAsFile();
                                if (file) snapshot.files.push(file);
                            }
                        } catch (err) { /* ignore */ }
                    }
                }

                // FileList も同期コピー
                try {
                    const fileList = dataTransfer.files;
                    snapshot.fileListCount = fileList ? fileList.length : 0;
                    if (fileList && fileList.length > 0) {
                        for (let i = 0; i < fileList.length; i++) {
                            snapshot.files.push(fileList[i]);
                        }
                    }
                } catch (err) {
                    console.warn("dataTransfer.files read failed:", err);
                }

                return snapshot;
            }

            /** スナップショットを展開して {file, relativePath}[] にする */
            async function hostExpandSnapshot(snapshot) {
                const results = [];
                const errors = [];

                // A) FileSystemHandle 優先（Chrome/Edge でフォルダ DnD が安定）
                if (snapshot.handlePromises.length > 0) {
                    try {
                        const handles = await Promise.all(snapshot.handlePromises);
                        for (const handle of handles) {
                            if (!handle) continue;
                            const nested = await hostCollectFilesFromHandle(handle, "");
                            results.push(...nested);
                        }
                        if (results.length > 0) {
                            console.log("# host VFS drop: via FileSystemHandle, count=", results.length);
                            return results;
                        }
                    } catch (err) {
                        console.warn("Handle expand failed:", err);
                        errors.push("handle:" + (err.message || err));
                    }
                }

                // B) 旧 Entry API
                if (snapshot.entries.length > 0) {
                    try {
                        for (const entry of snapshot.entries) {
                            const nested = await hostCollectFilesFromEntry(entry, "");
                            results.push(...nested);
                        }
                        if (results.length > 0) {
                            console.log("# host VFS drop: via Entry API, count=", results.length);
                            return results;
                        }
                    } catch (err) {
                        console.warn("Entry expand failed:", err);
                        errors.push("entry:" + (err.message || err));
                    }
                }

                // C) File オブジェクト直（フラット。階層は webkitRelativePath があれば維持）
                const seen = new Set();
                for (const file of snapshot.files) {
                    if (!file) continue;
                    // フォルダ偽ファイルをスキップ
                    if (!file.type && file.size % 4096 === 0 && file.size <= 4096) continue;
                    const key = file.name + ":" + file.size + ":" + file.lastModified;
                    if (seen.has(key)) continue;
                    seen.add(key);
                    const relativePath = (file.webkitRelativePath && file.webkitRelativePath.length > 0)
                        ? file.webkitRelativePath
                        : file.name;
                    results.push({ file, relativePath });
                }
                if (results.length > 0) {
                    console.log("# host VFS drop: via File list, count=", results.length);
                    return results;
                }

                const detail = [
                    "items=" + snapshot.itemCount,
                    "entries=" + snapshot.entries.length,
                    "handles=" + snapshot.handlePromises.length,
                    "files=" + snapshot.fileListCount,
                    "types=" + (snapshot.types || []).join("|"),
                    errors.length ? ("errors=" + errors.join(";")) : ""
                ].filter(Boolean).join(", ");
                throw new Error("No files found in drop. (" + detail + ")");
            }

            /**
             * スナップショットを展開して IDE へ postMessage
             * @param {object} snapshot
             * @param {"vfs"|"script"} zoneName
             * @param {string} targetPath
             */
            async function hostProcessExplorerDrop(snapshot, zoneName, targetPath) {
                if (!frame || !frame.contentWindow) return;
                if (hostDropProcessing) return;
                hostDropProcessing = true;

                const isScript = (zoneName === "script");
                const writeCmd = isScript ? "script_drop_write" : "vfs_drop_write";
                const errorCmd = isScript ? "script_drop_error" : "vfs_drop_error";

                try {
                    const collected = await hostExpandSnapshot(snapshot);
                    const payloadFiles = [];
                    const transferList = [];
                    for (const entry of collected) {
                        if (entry.isDirectory) {
                            payloadFiles.push({
                                relative_path: entry.relativePath,
                                is_directory: true
                            });
                            continue;
                        }
                        if (!entry.file) continue;
                        const buffer = await entry.file.arrayBuffer();
                        payloadFiles.push({
                            relative_path: entry.relativePath,
                            data: buffer
                        });
                        transferList.push(buffer);
                    }

                    if (payloadFiles.length === 0) {
                        throw new Error("Collected entries but no writable files.");
                    }

                    if (isScript) {
                        frame.contentWindow.postMessage({
                            cmd: writeCmd,
                            target_path: targetPath != null ? targetPath : "",
                            target_dir: targetPath != null ? targetPath : "",
                            files: payloadFiles
                        }, "*", transferList);
                    } else {
                        frame.contentWindow.postMessage({
                            cmd: writeCmd,
                            target_dir: targetPath || "/mnt/vfs_root",
                            files: payloadFiles
                        }, "*", transferList);
                    }

                } catch (err) {
                    console.error("Host explorer drop failed:", err);
                    frame.contentWindow.postMessage({
                        cmd: errorCmd,
                        message: String(err.message || err)
                    }, "*");
                } finally {
                    hostDropProcessing = false;
                }
            }

            // document キャプチャ: ゾーン上の dragover/drop を確実に拾う
            document.addEventListener("dragover", (e) => {
                if (!hostHasExternalFiles(e)) return;

                const zoneName = hostFindZoneAtPoint(e.clientX, e.clientY);
                if (zoneName) {
                    e.preventDefault();
                    try { e.dataTransfer.dropEffect = "copy"; } catch (err) { /* ignore */ }
                    hostStartDropCapture(zoneName);

                    // IDE にヒットテスト（フォルダ行判定）
                    if (frame && frame.contentWindow) {
                        const ir = frame.getBoundingClientRect();
                        const x = e.clientX - ir.left;
                        const y = e.clientY - ir.top;
                        const hitCmd = zoneName === "script" ? "script_dnd_hit_test" : "vfs_dnd_hit_test";
                        frame.contentWindow.postMessage({ cmd: hitCmd, x, y }, "*");
                    }
                } else if (hostDropCaptureActive) {
                    // ゾーン外へ出たらキャプチャ解除は dragend / drop 側で行う
                }
            }, true);

            document.addEventListener("drop", (e) => {
                if (!hostHasExternalFiles(e)) return;
                if (hostFindZoneAtPoint(e.clientX, e.clientY) || hostActiveDropZone) {
                    if (hostOnExplorerDropEvent(e)) return;
                }
                if (hostDropCaptureActive) {
                    hostEndDropCapture();
                }
            }, true);

            // オーバーレイ自身でも dragover/drop（キャプチャが取れない場合の保険）
            hostExplorerDropOverlay.addEventListener("dragover", (e) => {
                if (!hostHasExternalFiles(e)) return;
                e.preventDefault();
                e.stopPropagation();
                try { e.dataTransfer.dropEffect = "copy"; } catch (err) { /* ignore */ }
                hostPositionDropOverlay(hostActiveDropZone);
                if (frame && frame.contentWindow && hostActiveDropZone) {
                    const ir = frame.getBoundingClientRect();
                    const hitCmd = hostActiveDropZone === "script" ? "script_dnd_hit_test" : "vfs_dnd_hit_test";
                    frame.contentWindow.postMessage({
                        cmd: hitCmd,
                        x: e.clientX - ir.left,
                        y: e.clientY - ir.top
                    }, "*");
                }
            });

            hostExplorerDropOverlay.addEventListener("drop", (e) => {
                if (hostDropProcessing) return;
                hostOnExplorerDropEvent(e);
            });

            document.addEventListener("dragend", () => {
                hostEndDropCapture();
            }, true);

            // ウィンドウリサイズ時にオーバーレイ位置を追従
            window.addEventListener("resize", () => {
                if (hostDropCaptureActive) {
                    hostPositionDropOverlay(hostActiveDropZone);
                }
            });

            //-------------------------------------------------------- ### host_frame_post_message_汎用受信 ###
            window.addEventListener("message", async (event) => {

                // iframe要素(ide_container)のcontentWindowと、メッセージ送信元が一致するか検証
                // これにより、拡張機能や他のiframeからのなりすましメッセージを拒否する
                // 修正: 拡張機能のcontent script (window) からのメッセージも許可する
                // 許可されたオリジンの 親window からのメッセージも許可する

                // GitHub OAuth ポップアップ（Worker オリジン）からの結果を先に処理
                if (typeof handleGithubOAuthMessage === "function" && handleGithubOAuthMessage(event)) {
                    return;
                }

                const allowed_origins = [
                    "https://gemini.google.com"
                ];

                // 送信元が「chrome-extension://」で始まるか、または許可リストに含まれているか
                const is_extension = event.origin.startsWith("chrome-extension://");
                const is_allowed_origin = allowed_origins.some(origin => event.origin.startsWith(origin));

                if (event.source !== frame.contentWindow && (event.source !== window.opener && !is_allowed_origin)) {
                    console.warn("Security Alert: Ignored message from unknown source.");
                    return;
                }

                const data = (() => {
                    if (event.source === window.opener && is_allowed_origin) {
                        return parseAgentResponse(event.data.text);
                    } else {
                        return event.data;
                    }
                })();

                console.log("# get_post_message #", data);

                //-------------------------------------------------------- ### Explorer DnD 制御（IDE → Host: VFS / Script）
                if (event.source === frame.contentWindow && data && typeof data.cmd === "string") {
                    if (data.cmd === "vfs_drop_zone_rect") {
                        const r = data.obj || {};
                        if (typeof r.left === "number" && typeof r.top === "number" &&
                            typeof r.width === "number" && typeof r.height === "number") {
                            hostDropZones.vfs.rect = r;
                            if (hostDropCaptureActive && hostActiveDropZone === "vfs") {
                                hostPositionDropOverlay("vfs");
                            }
                        }
                        return;
                    }
                    if (data.cmd === "script_drop_zone_rect") {
                        const r = data.obj || {};
                        if (typeof r.left === "number" && typeof r.top === "number" &&
                            typeof r.width === "number" && typeof r.height === "number") {
                            hostDropZones.script.rect = r;
                            if (hostDropCaptureActive && hostActiveDropZone === "script") {
                                hostPositionDropOverlay("script");
                            }
                        }
                        return;
                    }
                    if (data.cmd === "vfs_external_drag_enter") {
                        // IDE の VFS 上で外部ファイルがドラッグされた → ホスト capture 開始
                        hostStartDropCapture("vfs");
                        return;
                    }
                    if (data.cmd === "script_external_drag_enter") {
                        hostStartDropCapture("script");
                        return;
                    }
                    if (data.cmd === "vfs_dnd_target") {
                        const obj = data.obj || {};
                        // ヒットテスト結果で書き込み先フォルダを更新
                        if (obj.in_vfs && obj.path) {
                            hostDropZones.vfs.targetPath = obj.path;
                        } else if (obj.in_vfs) {
                            hostDropZones.vfs.targetPath = hostDropZones.vfs.defaultPath;
                        }
                        return;
                    }
                    if (data.cmd === "script_dnd_target") {
                        const obj = data.obj || {};
                        if (obj.disabled) {
                            // GitHub 表示中など: 受け入れ不可
                            return;
                        }
                        if (obj.in_script) {
                            hostDropZones.script.targetPath =
                                (obj.path != null) ? obj.path : hostDropZones.script.defaultPath;
                        }
                        return;
                    }
                }

                // ブックマークレット連携（外部LLM）からの応答の場合のみ連続エラーを判定
                if (event.source === window.opener && is_allowed_origin) {
                    if (trackAgentResponseStatus(data.cmd)) {
                        alert("【エージェント停止】有効なJSONコマンドが3回連続で検出されなかったため、外部連携ループを自動停止しました。");

                        // 呼び出し元のGemini側にも停止メッセージを投げて無限フィードバックを防ぐ
                        const stopPayload = {
                            "cmd": "Agent_Stopped",
                            "message": "システム通知: 3回連続で有効なコマンドが検出されなかったため、安全のために自律ループを強制停止しました。"
                        };
                        if (window.opener && !window.opener.closed) {
                            window.opener.postMessage(stopPayload, "*");
                        }
                        return; // 処理をここで終了し、Sandboxへの転送や返送を行いません
                    }
                // WEB_BRIDGEからのコマンド処理を共通関数に委譲して終了
                    executeAgentCommand(data, "WEB_BRIDGE");
                    return; 
                }

                //-------------------------------------------------------- ### スクリプト実行完了信号受信
                if (data && data.cmd === "script_complete") {
                    console.log("# host_frame_log : script_complete")
                    set_header_buttons_state(true);
                    set_stop_button_state(true);
                    //-------------------------------------------------------- ### Return_Result_to_Gemini
                    if (typeof data.obj.log !== "undefined") {
                        const responsePayload = {
                            "cmd": "script_result",
                            "result": data.obj.log
                        };

                        // 実行元（Nano または WEB_BRIDGE）を判別して結果を専用関数で返す
                        if (activeAgentSource) {
                            sendResponseToAgent(responsePayload, activeAgentSource);
                            console.log(`# host_frame_log : Sent_script_result to ${activeAgentSource}`);
                            
                            // 処理完了後は誤送信を防ぐためリセットしておく
                            activeAgentSource = null;
                        } else {
                            console.warn("# host_frame_log : activeAgentSource is null. Cannot send script_result.");
                        }
                    }
                    return;
                }

                //-------------------------------------------------------- ### シリアル通信依頼受信
                if (data && data.cmd === "serial_write") {
                    const req_id = data.req_id;
                    const sub_cmd = data.obj.sub_cmd; // "connect", "write", "disconnect"
                    const args = data.args || [];

                    try {
                        let result = null;
                        if (sub_cmd === "connect") {
                            // args[0] に { baudRate: 115200 } 等のオプションが入る想定
                            result = await SPM.serial_connect(args[0]);
                        } else if (sub_cmd === "write") {
                            // args[0] に送信用データ(配列)が入る想定
                            result = await SPM.serial_write(args[0]);
                        } else if (sub_cmd === "disconnect") {
                            result = await SPM.serial_disconnect();
                        }

                        // 成功レスポンスを返す
                        frame.contentWindow.postMessage({ req_id, status: "success", result }, "*");

                    } catch (error) {
                        console.error("Serial Ctrl Error:", error);
                        frame.contentWindow.postMessage({ req_id, status: "error", error: error.toString() }, "*");
                    }
                    return; // 処理終了
                }

                //-------------------------------------------------------- ### GitHub 連携（IDE → Host）※ token は含めない
                if (data && typeof data.cmd === "string" && data.cmd.indexOf("github_") === 0) {
                    // IDE フレームからのみ受理
                    if (event.source !== frame.contentWindow) {
                        console.warn("Security Alert: github_* from non-IDE source ignored.");
                        return;
                    }
                    if (!githubFeatureEnabled) {
                        postToIdeGithub({ cmd: "github_error", message: "GitHub 機能は現在のホスティングでは無効です。" });
                        return;
                    }
                    const gObj = data.obj || {};
                    try {
                        if (data.cmd === "github_file_request") {
                            await handleGithubFileRequest(gObj.path);
                        } else if (data.cmd === "github_push_request") {
                            await handleGithubPushRequest(gObj);
                        } else if (data.cmd === "github_refresh_tree_request") {
                            await handleGithubRefreshTree();
                        } else if (data.cmd === "github_open_repo_request") {
                            // 将来 IDE 側 UI 用。現状はホストモーダルで Open
                            setGithubModalStatus("リポジトリ Open はホストの GitHub モーダルから行ってください。");
                        } else {
                            console.warn("Unknown github cmd:", data.cmd);
                        }
                    } catch (err) {
                        console.error(err);
                        postToIdeGithub({ cmd: "github_error", message: String(err.message || err) });
                    }
                    return;
                }

                //-------------------------------------------------------- ### Fetch API (POST) 依頼受信
                if (data && data.cmd === "fetch_post") {
                    console.log("# host_flame_fetch_post #")
                    console.log(data)
                    const req_id = data.req_id;
                    const url = data.args[0];
                    const post_data = data.obj;
                    // 1. URLバリデーション (ホワイトリストチェック)
                    if (!ALLOWED_POST_URLS.includes(url)) {
                        console.error(`Blocked: URL not allowed: ${url}`);
                        frame.contentWindow.postMessage({
                            req_id,
                            status: "error",
                            error: "Security Error: Destination URL is not allowed."
                        }, "*");
                        return;
                    }
                    // 2. データサイズチェック(lim:10MB)
                    const payload_str = JSON.stringify(post_data);
                    if (payload_str.length > 1024 * 1024 * 10) {
                        frame.contentWindow.postMessage({
                            req_id,
                            status: "error",
                            error: "Security Error: Payload too large."
                        }, "*");
                        return;
                    }
                    try {
                        // 3. Fetch API の実行
                        const response = await fetch(url, {
                            method: "POST",
                            headers: {
                                "Content-Type": ["application/json", "text/plain;charset=utf-8"][1]
                                // 必要に応じて Authorization ヘッダーなどをここに追加
                                // "Authorization": "Bearer xxxxx"
                            },
                            body: JSON.stringify(post_data)
                        });
                        // 4. レスポンスの処理
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        const result = await response.json(); // JSONレスポンスを想定
                        // 5. 結果をiframeへ返信
                        frame.contentWindow.postMessage({
                            req_id,
                            status: "success",
                            result: result
                        }, "*");
                    } catch (error) {
                        console.error("Fetch Error:", error);
                        frame.contentWindow.postMessage({
                            req_id,
                            status: "error",
                            error: error.toString()
                        }, "*");
                    }
                    return;
                }
            });

        })();

        /* #################### ↑↑↑ script_ROOT ↑↑↑ #################### */
    </script>

</body>
