        //-------------------------------------------------------- ### GitHub Push 用: 開いている GitHub タブを収集
        function collect_github_open_files_for_push() {
            const files = [];
            for (const tabId in tabs_data) {
                const tab = tabs_data[tabId];
                if (!tab || tab.type !== "editor" || !tab.githubPath || !tab.model) {
                    continue;
                }
                files.push({
                    path: tab.githubPath,
                    content: tab.model.getValue()
                });
            }
            return files;
        }

        //-------------------------------------------------------- ### ホストからの GitHub 系メッセージ処理
        function handle_github_host_message(data) {
            if (!data || !data.cmd) return false;

            if (data.cmd === "github_auth_state") {
                githubLoginName = data.loggedIn ? (data.loginName || null) : null;
                if (!data.loggedIn) {
                    githubExplorerActive = false;
                    githubRepoContext = null;
                    // GitHub セッション終了時は Script ツリーもクリア
                    if (scriptExplorerState.type === "github") {
                        scriptExplorerState = { type: null, tree: null };
                        script_explorer_element.textContent = "Use 'script_dir' to browse local scripts.";
                    }
                }
                return true;
            }

            if (data.cmd === "github_repo_tree") {
                try {
                    githubExplorerActive = true;
                    githubRepoContext = {
                        owner: data.owner,
                        repo: data.repo,
                        branch: data.branch || "main"
                    };
                    const tree = Array.isArray(data.tree) ? data.tree : [];
                    // ルートにリポジトリ名フォルダを被せて視認性を上げる
                    const wrapperTree = [{
                        name: `${data.owner}/${data.repo}@${githubRepoContext.branch}`,
                        type: "folder",
                        path: "",
                        children: tree
                    }];
                    scriptExplorerState = { type: "github", tree: wrapperTree };
                    render_file_explorer(wrapperTree, "github", script_explorer_element);
                    js_result_area_element.value = `GitHub tree loaded: ${data.owner}/${data.repo} (${githubRepoContext.branch})`;
                } catch (err) {
                    console.error(err);
                    js_result_area_element.value = `GitHub tree render error: ${err.message}`;
                } finally {
                    toggle_loading(false);
                }
                return true;
            }

            if (data.cmd === "github_file_content") {
                try {
                    const path = data.path || "";
                    const content = typeof data.content === "string" ? data.content : "";
                    // タブ名はリポジトリ内パスを使用（同名ファイル衝突を避ける）
                    open_tab(path, content, false, { forceUpdate: true, githubPath: path });
                    file_name_val = path;
                    js_result_area_element.value = `${path} loaded from GitHub.`;
                    if (editor) {
                        analyze_python_code(editor.getValue());
                    }
                } catch (err) {
                    console.error(err);
                    js_result_area_element.value = `GitHub file open error: ${err.message}`;
                    alert(`GitHub ファイルを開けませんでした: ${err.message}`);
                }
                return true;
            }

            if (data.cmd === "github_push_result") {
                const ok = data.ok === true;
                const msg = data.message || (ok ? "Push succeeded." : "Push failed.");
                js_result_area_element.value = msg;
                if (ok) {
                    alert(msg);
                } else {
                    alert("Push 失敗: " + msg);
                }
                return true;
            }

            if (data.cmd === "github_error") {
                const msg = data.message || "GitHub error";
                js_result_area_element.value = msg;
                toggle_loading(false);
                alert(msg);
                return true;
            }

            // ホストから Push 用ファイル収集を要求された場合
            if (data.cmd === "github_collect_for_push") {
                const files = collect_github_open_files_for_push();
                const message = data.commitMessage || "Update from Pyodide IDE";
                const branch = (githubRepoContext && githubRepoContext.branch) || data.branch || "main";
                js_post_message("github_push_request", "host", "*", {
                    files,
                    message,
                    branch,
                    owner: githubRepoContext ? githubRepoContext.owner : null,
                    repo: githubRepoContext ? githubRepoContext.repo : null
                }, []);
                return true;
            }

            return false;
        }

        //-------------------------------------------------------- ### エクスプローラーアイテムへのイベント付与ロジックの分離 ###
        function attach_explorer_item_events(li, row_div, item, type) { // 引数に row_div を追加
            // --- クリックイベント (共通) ---
            // li ではなく row_div (行部分) にイベントを貼ることで、子要素クリック時のバブリング問題を回避
            if (item.type === "file") {
                row_div.addEventListener("click", (e) => {
                    e.stopPropagation();
                    handle_explorer_item_click(row_div); // 選択色を適用

                    if (type === "drive") load_file_content(item.id, item.name);
                    else if (type === "local") load_local_file_content_from_handle(item.handle, item.name);
                    else if (type === "local_upload") load_local_file_content_from_file(item.handle, item.name);
                    else if (type === "vfs") load_local_file_content_from_vfs(item.vfs_path, item.name);
                    else if (type === "github") load_github_file_content(item.path, item.name);
                });
            }

            // --- Script_Explorer (local_upload): 内部移動 + フォルダへの外部 drop ---
            if (type === "local_upload") {
                row_div.setAttribute("draggable", "true");
                row_div.addEventListener("dragstart", (e) => {
                    e.stopPropagation();
                    handle_explorer_item_click(row_div);
                    if (item.script_path) {
                        e.dataTransfer.setData("application/script-path", item.script_path);
                        e.dataTransfer.effectAllowed = "move";
                    }
                });

                if (item.type === "folder") {
                    row_div.addEventListener("dragover", (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        row_div.classList.add("script_drop_target");
                        const types = Array.from((e.dataTransfer && e.dataTransfer.types) || []);
                        const is_internal = types.includes("application/script-path");
                        e.dataTransfer.dropEffect = is_internal ? "move" : "copy";
                    });

                    row_div.addEventListener("dragleave", (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        row_div.classList.remove("script_drop_target");
                    });

                    row_div.addEventListener("drop", async (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        row_div.classList.remove("script_drop_target");

                        // 1) Script 内部移動
                        const src_path = e.dataTransfer.getData("application/script-path");
                        if (src_path) {
                            handle_script_move(src_path, item.script_path || "");
                            return;
                        }

                        // 2) OS からの外部 DnD（FileList フォールバック。フォルダ本線はホスト）
                        await handle_script_drop(e, item.script_path || "");
                    });
                }
            }

            // --- VFS特有のイベント (ドラッグ＆ドロップ / 右クリック) ---
            if (type === "vfs") {
                // Drag Start (行部分をドラッグ可能にする)
                row_div.setAttribute("draggable", "true");
                row_div.addEventListener("dragstart", (e) => {
                    e.stopPropagation();
                    // ドラッグ時は選択状態にする
                    handle_explorer_item_click(row_div); // ★ 選択色を適用
                    e.dataTransfer.setData("application/vfs-path", item.vfs_path);
                    e.dataTransfer.effectAllowed = "move";
                });

                if (item.type === "folder") {
                    // Drop Target (フォルダ行へのドロップ: 内部移動 / 外部ファイル追加)
                    row_div.addEventListener("dragover", (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        row_div.classList.add("vfs_drop_target"); // liではなくrow_divにクラス付与
                        // 内部移動は move、OS からの DnD は copy
                        const is_internal = Array.from(e.dataTransfer.types || []).includes("application/vfs-path");
                        e.dataTransfer.dropEffect = is_internal ? "move" : "copy";
                    });

                    row_div.addEventListener("dragleave", (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        row_div.classList.remove("vfs_drop_target");
                    });

                    row_div.addEventListener("drop", async (e) => {
                        e.preventDefault();
                        e.stopPropagation(); // コンテナ側への二重処理を防止
                        row_div.classList.remove("vfs_drop_target");

                        // 1) VFS 内部の移動（従来動作・IDE 内で完結）
                        const src_path = e.dataTransfer.getData("application/vfs-path");
                        if (src_path) {
                            handle_vfs_move(src_path, item.vfs_path);
                            return;
                        }

                        // 2) OS からの外部 DnD
                        //    フォルダ階層は sandbox(null origin) では読めないため、
                        //    ホスト側オーバーレイ経由が本線。ここに来た場合は FileList フォールバック。
                        await handle_vfs_drop(e, item.vfs_path);
                    });

                    // Context Menu: ZIP Download (Folder)
                    row_div.addEventListener("contextmenu", (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        handle_explorer_item_click(row_div); // ★ 右クリック時も選択色を適用

                        const user_pass = window.prompt(
                            `【Folder Download】: ${item.name}\n\nZIPパスワードを入力してください。\n(空欄で非暗号化ZIP)`
                        );

                        if (user_pass === null) return;
                        // ... (以下既存処理と同じ) ...
                        if (user_pass === "") {
                            if (typeof js_encrypt_zipper === "function") {
                                js_encrypt_zipper(item.vfs_path, item.name + ".zip", null, false);
                            }
                        } else {
                            const use_legacy = window.confirm(`【暗号化方式】\nパスワード: "${user_pass}"\n[OK]: Legacy ZipCrypto\n[キャンセル]: AES-256`);
                            if (typeof js_encrypt_zipper === "function") {
                                js_encrypt_zipper(item.vfs_path, item.name + ".zip", user_pass, use_legacy);
                            }
                        }
                    });
                } else if (item.type === "file") {
                    // Context Menu: File Download
                    row_div.addEventListener("contextmenu", (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        handle_explorer_item_click(row_div); // ★ 右クリック時も選択色を適用

                        const do_download = window.confirm(`【File Download】\n\nFile: ${item.name}\n\nダウンロードしますか？`);
                        if (do_download) {
                            if (typeof js_download_vfs_file === "function") {
                                js_download_vfs_file(item.vfs_path);
                            }
                        }
                    });
                }
            }
        }

        //-------------------------------------------------------- ### 再帰的にファイルツリーのHTML要素を生成する ###
        function create_tree_level(items, type) {
            const ul = document.createElement("ul");

            items.forEach(item => {
                const li = document.createElement("li");
                // li.textContent = item.name; // ← 削除: liに直接文字を入れない

                // 行を表す div を作成し、ここにテキストを入れる
                const row_div = document.createElement("div");

        //-------------------------------------------------------- ### 文字コード自動判別関数 ###
        function decode_auto(uint8_array) {
            // 1. UTF-8 (fatal: true で不正バイトがあればエラーを吐かせる)
            try {
                const decoder = new TextDecoder("utf-8", { fatal: true });
                return decoder.decode(uint8_array);
            } catch (e) {
                console.log("Not UTF-8, trying Shift_JIS...");
            }

            // 2. Shift_JIS (CP932)
            try {
                const decoder = new TextDecoder("shift_jis", { fatal: true });
                return decoder.decode(uint8_array);
            } catch (e) {
                console.log("Not Shift_JIS, trying EUC-JP...");
            }

            // 3. EUC-JP
            try {
                const decoder = new TextDecoder("euc-jp", { fatal: true });
                return decoder.decode(uint8_array);
            } catch (e) {
                console.log("Encoding detection failed. Fallback to UTF-8.");
            }

            // 4. フォールバック (エラー無視で UTF-8 で開く)
            const decoder = new TextDecoder("utf-8", { fatal: false });
            return decoder.decode(uint8_array);
        }

        //-------------------------------------------------------- ### ディレクトリハンドルから再帰的にファイルツリー構造を生成する
        async function create_tree_from_directory(directoryHandle) {
            const tree = [];
            for await (const entry of directoryHandle.values()) {
                const item = {
                    name: entry.name,
                    handle: entry, // ファイル/フォルダハンドルを保持
                };
                if (entry.kind === "directory") {
                    item.type = "folder";
                    item.children = await create_tree_from_directory(entry);
                } else {
                    item.type = "file";
                }
                tree.push(item);
            }
            // フォルダが先、ファイルが後になるようにソート
            tree.sort((a, b) => {
                if (a.type === b.type) return a.name.localeCompare(b.name);
                return a.type === "folder" ? -1 : 1;
            });
            return tree;
        }

        //-------------------------------------------------------- ### (Pyodide VFS用) ディレクトリを再帰的に削除する
        /**
         * @param {string} path - VFS内のパス
         */
        function remove_directory_recursive_vfs(path) {
            let stat;
            try {
                stat = pyodide_js.FS.stat(path);
            } catch (e) {
                return; // 存在しない
            }

            if (pyodide_js.FS.isDir(stat.mode)) {
                // ディレクトリの場合
                const entries = pyodide_js.FS.readdir(path);
                for (const entry of entries) {
                    if (entry !== "." && entry !== "..") {
                        remove_directory_recursive_vfs(`${path}/${entry}`);
                    }
                }
                pyodide_js.FS.rmdir(path); // 中身が空になったディレクトリを削除
            } else if (pyodide_js.FS.isFile(stat.mode)) {
                // ファイルの場合
                pyodide_js.FS.unlink(path); // ファイルを削除
            }
        }

        //-------------------------------------------------------- ### エクスプローラーツリー構築ヘルパー
        /**
         * @param {string} path - VFS内の相対パス (例: "sub/data.txt")
         * @param {Array} tree - 構築中のツリー配列 (トップレベル)
         * @param {Object} handle_map - ファイル/フォルダ識別のための仮マップ
         * @param {File} file_object - 元のFileオブジェクト (ファイルの場合のみ)
         */
        function add_path_to_tree_vfs(path, tree, handle_map, file_object) {
            if (!path) return; // 空のパスは無視

            const parts = path.split("/");
            let current_level = tree;
            let current_path = ""; // ツリー構築用の仮想パス

            for (let i = 0; i < parts.length; i++) {
                const part = parts[i];
                current_path = current_path ? `${current_path}/${part}` : part;

                let node = handle_map[current_path];

                if (!node) {
                    const is_file = (i === parts.length - 1);
                    node = {
                        name: part,
                        type: is_file ? "file" : "folder",
                        handle: is_file ? file_object : null, // ファイルはFileオブジェ、フォルダはnull
                        children: []
                    };
                    handle_map[current_path] = node;
                    current_level.push(node);
                }

                if (node.type === "folder") {
                    current_level = node.children;
                }
            }
        }

        //-------------------------------------------------------- ### 選択されたローカルフォルダをスクリプトツリーにアップロード
        async function handle_upload_folder_to_script_tree(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            toggle_loading(true, "Processing Script Tree..."); // ローディング表示開始

            try {
                let root_folder = files[0].webkitRelativePath.split("/")[0];
                let tree = [];
                let map = {};

                for (const file of files) {
                    const rel = file.webkitRelativePath;
                    const path = rel.substring(root_folder.length + 1);
                    if (!path) continue;
                    add_path_to_tree_vfs(path, tree, map, file);
                }

                const final_tree = [{
                    name: root_folder,
                    type: "folder",
                    children: tree,
                    handle: null
                }];

                // アップロードボタンは従来どおり全置換
                githubExplorerActive = false;
                set_script_explorer_tree("local_upload", final_tree);
                js_result_area_element.value = `Local Script Folder "${root_folder}" loaded.`;

            } catch (error) {
                console.error("Script Tree Load Error:", error);
                js_result_area_element.value = `Error: ${error.message}`;

            } finally {
                toggle_loading(false); // ローディング表示終了
                event.target.value = ""; // 同じフォルダを再選択できるように値をクリア
            }
        }

        //-------------------------------------------------------- ### 選択されたローカルフォルダをPyodideのVFSにアップロード
        async function handle_upload_folder_to_vfs(event) {
            const files = event.target.files;
            if (!files || files.length === 0) {
                return; // ファイルが選択されなかった
            }

            toggle_loading(true, "Uploading to VFS..."); // ローディング表示開始

            // ルートフォルダ名を特定する必要はありますが、パスの除去はしません
            let root_folder_name = "";
            if (files.length > 0) {
                const first_path_parts = files[0].webkitRelativePath.split("/");
                if (first_path_parts.length > 0) {
                    root_folder_name = first_path_parts[0];
                }
            }

            // VFSのマウントポイント
            const mount_point = MOUNT_PATH;
            js_result_area_element.value = `Uploading "${root_folder_name}" to VFS (${mount_point})...`;

            try {
                // 既存のマウント/アップロードがあればクリア (vfs_dirの中身を空にする)
                if (is_mounted) {
                    try {
                        // 前回がNativeFSマウントだった場合のアンマウント試行
                        // (具体的なマウントパスが不明なため、MOUNT_PATH直下等を想定)
                        // 今回のロジック変更に伴い、念のため再帰削除でクリーンアップします
                        if (mounted_dir_handle) {
                            const prev_mount = `${MOUNT_PATH}/${mounted_dir_handle.name}`;
                            try { pyodide_js.FS.unmount(prev_mount); } catch (e) { }
                        }
                        try { pyodide_js.FS.unmount(MOUNT_PATH); } catch (e) { }
                    } catch (e_unmount) {
                        console.warn("Unmount failed (proceeding):", e_unmount.message);
                    }
                }

                // VFSのリセット (vfs_dir自体を作り直す)
                try {
                    remove_directory_recursive_vfs(mount_point);
                } catch (e) { console.log("Cleanup vfs info:", e); }

                try {
                    pyodide_js.FS.mkdirTree(mount_point);
                } catch (e) { } // 既に存在すればOK

                // ファイルをVFSに書き込む
                for (const file of files) {
                    // webkitRelativePath をそのまま使うことで、
                    // "Data/A.txt" なら "/mnt/vfs_root/Data/A.txt" に配置されます
                    const full_relative_path = file.webkitRelativePath;

                    if (!full_relative_path) continue;

                    const vfs_path = `${mount_point}/${full_relative_path}`;

                    // 親ディレクトリを再帰的に作成
                    const dir_name = vfs_path.substring(0, vfs_path.lastIndexOf("/"));
                    if (dir_name) {
                        pyodide_js.FS.mkdirTree(dir_name);
                    }

                    const file_buffer = await file.arrayBuffer();
                    const data = new Uint8Array(file_buffer);

                    pyodide_js.FS.writeFile(vfs_path, data);
                }

                is_mounted = true; // アップロード完了
                mounted_dir_handle = null; // NativeFSではないためnull

                refresh_vfs_explorer_view();

                js_result_area_element.value = `Folder "${root_folder_name}" uploaded to ${mount_point}.`;

            } catch (error) {
                console.error("Error uploading folder to VFS:", error);
                js_result_area_element.value = `Error: ${error.message}`;
                alert(`フォルダのアップロードに失敗しました: ${error.message}`);

            } finally {
                toggle_loading(false); // ローディング表示終了
                event.target.value = ""; // 同じフォルダを再選択できるように値をクリア
            }
        }

        //-------------------------------------------------------- ### Pyodide VFSから再帰的にツリーを構築する
        function create_tree_from_vfs(path) {
            const tree = [];
            let entries;
            try {
                const stat = pyodide_js.FS.stat(path);
                if (!pyodide_js.FS.isDir(stat.mode)) {
                    return []; // ディレクトリではない
                }
                entries = pyodide_js.FS.readdir(path);
            } catch (e) {
                return []; // パスが存在しないかエラー
            }

            entries.forEach(entry => {
                if (entry === "." || entry === "..") return; // スキップ

                const full_path = `${path}/${entry}`;
                let entry_stat;
                try {
                    entry_stat = pyodide_js.FS.stat(full_path);
                } catch (e) {
                    return; // statが取れないファイルはスキップ
                }

                const item = {
                    name: entry,
                    handle: null, // VFS内のファイル/フォルダには "handle" は無い
                    vfs_path: full_path // VFS内のパスを保持
                };

                if (pyodide_js.FS.isDir(entry_stat.mode)) {
                    item.type = "folder";
                    item.children = create_tree_from_vfs(full_path);
                } else {
                    item.type = "file";
                }
                tree.push(item);
            });

            // ソート
            tree.sort((a, b) => {
                if (a.type === b.type) return a.name.localeCompare(b.name);
                return a.type === "folder" ? -1 : 1;
            });

            return tree;
        }

        // VFSエクスプローラーを更新する
        function refresh_vfs_explorer_view() {
            if (!pyodide_js || !pyodide_js.FS) {
                vfs_explorer_element.textContent = "Pyodide not ready.";

            vfs_explorer_element.textContent = `Scanning VFS at ${MOUNT_PATH}...`;

                type: "folder",
                children: tree,
                handle: null,
                vfs_path: MOUNT_PATH
            }];

        //-------------------------------------------------------- ### Syntax_Check_Logic ###
        // 構文解析とエラーチェックを一度に行う関数
        async function analyze_python_code(code) {

            // エディタの現在の言語モードを確認
            const model = editor.getModel();
            // タブ無しなどでモデルが無い場合はアウトラインのみクリア
            if (!model) {
                render_outline([]);
                return;
            }
            const language_id = model.getLanguageId(); // "python", "javascript", "html" 等が返る

            // Pythonでない場合は解析を行わず、アウトラインとエラーをクリアして終了
            if (language_id !== "python") {
                render_outline([]); // アウトラインをクリア
                monaco.editor.setModelMarkers(model, "owner", []); // 赤線をクリア
                return;
            }

            // コードが空の場合は何もしない
            if (!code.trim()) {
                // アウトラインクリアとエラークリアを行って終了
                render_outline([]);
                monaco.editor.setModelMarkers(editor.getModel(), "owner", []);
                return;
            }

            pyodide_js.globals.set("code_js", code);

            const py_result = await pyodide_js.runPythonAsync(`
import ast, json, sys

code = code_js
result = {
	"outline": [],
	"errors": []
}

# NodeVisitor定義（アウトライン抽出用）
class OutlineVisitor(ast.NodeVisitor):
	def __init__(self):
		self.data = []
		self.level = 0

	def generic_visit(self, node):
		super().generic_visit(node)

	def visit_ClassDef(self, node):
		self.data.append({"type": "class", "name": node.name, "line": node.lineno, "level": self.level})
		self.level += 1
		self.generic_visit(node)
		self.level -= 1

	def visit_FunctionDef(self, node):
		if node.name != "__init__":
			self.data.append({"type": "function", "name": node.name, "line": node.lineno, "level": self.level})
			self.level += 1
			self.generic_visit(node)
			self.level -= 1

	def visit_AsyncFunctionDef(self, node):
		if node.name != "__init__":
			self.data.append({"type": "function", "name": node.name, "line": node.lineno, "level": self.level})
			self.level += 1
			self.generic_visit(node)
			self.level -= 1

try:
	# --- 1回だけのパース処理 ---
	tree = ast.parse(code)

	# 成功した場合：アウトラインを抽出
	visitor = OutlineVisitor()
	visitor.visit(tree)
	result["outline"] = visitor.data

except SyntaxError as e:
	# 失敗した場合：エラー情報を抽出
	err_dict = {
		"line": e.lineno,
		"col": e.offset,
		"end_line": e.end_lineno,
		"end_col": e.end_offset,
		"message": e.msg
	}
	# Noneガード
	if err_dict["line"] is None: err_dict["line"] = 1
	if err_dict["col"] is None: err_dict["col"] = 1
	if err_dict["end_line"] is None: err_dict["end_line"] = err_dict["line"]
	if err_dict["end_col"] is None: err_dict["end_col"] = err_dict["col"] + 1

	result["errors"].append(err_dict)

except Exception:
	pass

json.dumps(result)
`);

            const data = JSON.parse(py_result);

            // --- 1. アウトラインの更新処理 ---
            // グローバル変数 outline_data を更新（必要であれば）し、描画関数を呼ぶ
            // ※ここでは直接描画関数を呼ぶ形にしています。既存の update_outline の中身に合わせて調整してください
            render_outline(data.outline);


            // --- 2. エディタのエラーマーカー更新処理 ---
            const markers = data.errors.map(err => {
                return {
                    startLineNumber: err.line,
                    startColumn: err.col,
                    endLineNumber: err.end_line,
                    endColumn: err.end_col,
                    message: err.message,
                    severity: monaco.MarkerSeverity.Error
                };
            });
            monaco.editor.setModelMarkers(editor.getModel(), "owner", markers);
        }

        function render_outline(outline_list) {
            const outline_container = document.getElementById("code_outline");

            if (!outline_container) return;
            outline_container.innerHTML = "";

            // データがない、または配列でない場合は終了
            if (!outline_list || !Array.isArray(outline_list)) return;

            outline_list.forEach(item => {
                // CSSに合わせて div 要素を作成
                const div = document.createElement("div");

                // 共通クラス
                div.classList.add("outline-item");

                // タイプ別クラスとアイコン等の装飾
                if (item.type === "class") {
                    div.classList.add("class-item");
                    div.textContent = `C: ${item.name}`; // Classを示す "C:" を付与（お好みで変更可）
                } else {
                    div.classList.add("function-item");
                    div.textContent = `f: ${item.name}`; // Functionを示す "f:" を付与
                }

                // インデント処理 (階層レベル * 15px)
                // function-item はCSSで既に padding-left: 15px があるため、計算に加算して調整
                const base_padding = item.type === "function" ? 15 : 0;
                div.style.paddingLeft = `${base_padding + (item.level * 15)}px`;

                // クリック時のジャンプ動作
                div.onclick = () => {
                    jump_to_line(item.line);
                };

                outline_container.appendChild(div);
            });
        }

        //-------------------------------------------------------- ### Outline_jump
        function jump_to_line(lineNumber) {
            editor.revealLineInCenter(lineNumber);
            editor.setPosition({ lineNumber: lineNumber, column: 1 });
            editor.focus();
        }

        //-------------------------------------------------------- ### Drag_Handler_(メモリリーク対策) ###
        function attach_drag_handler(element, onDrag, onStart) {
            if (!element) return; // 要素が存在しない場合は何もしない

            const startDrag = (e) => {
                // マウスのデフォルト動作（テキスト選択など）を無効化
                e.preventDefault();

                let startX = e.clientX;
                let startY = e.clientY;

                // ドラッグ開始時のコールバックを実行（初期値の取得などに使用）
                if (onStart) onStart();

                // ドラッグ中の処理 (onMouseMove) を定義
                const onMouseMove = (moveEvent) => {
                    const dx = moveEvent.clientX - startX;
                    const dy = moveEvent.clientY - startY;

                    // onDrag コールバックを実行
                    if (onDrag) onDrag(dx, dy);
                };

                // ドラッグ終了時の処理 (onMouseUp) を定義
                const onMouseUp = () => {
                    // イベントリスナーを確実に削除し、メモリリークを防ぐ
                    document.removeEventListener("mousemove", onMouseMove);
                    document.removeEventListener("mouseup", onMouseUp);
                };

                // リスナーを document に追加し、ドラッグが要素外に出ても追跡できるようにする
                document.addEventListener("mousemove", onMouseMove);
                document.addEventListener("mouseup", onMouseUp);
            };

            // ドラッグ開始リスナーを設定
            element.addEventListener("mousedown", startDrag);
        }

        //-------------------------------------------------------- ### Resizer_Logic_(FIXED) ###
        function setup_resizers() {

            let start_sidebar_width;
            attach_drag_handler(sidebar_resizer_v_element, (dx) => {

            // 2. script_explorer_height // (Script_Explorer <-> VFS_Explorer)
            let start_script_h;
            attach_drag_handler(sidebar_resizer_h_element, (dx, dy) => {
                const new_script_height = start_script_h + dy;
                const sidebar_height = sidebar_area_container_element.clientHeight;
                const new_vfs_height = sidebar_height - new_script_height - outline_container_element.offsetHeight - sidebar_resizer_h_element.offsetHeight - sidebar_resizer_h2_element.offsetHeight;
                if (new_script_height > 50 && new_vfs_height > 50) {

            // 3. VFS_explorer_height // (VFS_Explorer <-> outline)
            let start_vfs_h;
            attach_drag_handler(sidebar_resizer_h2_element, (dx, dy) => {
                const new_vfs_height = start_vfs_h + dy;
                const sidebar_height = sidebar_area_container_element.clientHeight;
                const new_outline_height = sidebar_height - new_vfs_height - script_container_element.offsetHeight - sidebar_resizer_h_element.offsetHeight - sidebar_resizer_h2_element.offsetHeight;
                if (new_vfs_height > 50 && new_outline_height > 50) {

                    outline_container_element.style.flexBasis = `${new_outline_height}px`;

            }, () => start_vfs_h = vfs_container_element.offsetHeight);

            // 4. py_result_width // (py_result_area <-> js_result_area)
            let start_py_result_w;
            let start_js_result_w; // 変数追加
            let start_plot_w;      // 変数追加

            attach_drag_handler(footer_resizer_v_element, (dx, dy) => {
                const new_py_result_width = start_py_result_w + dx;
                const footer_width = footer_area_container_element.clientWidth;
                // 全体幅 - (左エリア新幅 + 右エリア固定幅 + リサイザー合計幅) = 中央エリア新幅
                const resizer_total_width = footer_resizer_v_element.offsetWidth + footer_resizer_v2_element.offsetWidth;
                const new_js_result_width = footer_width - new_py_result_width - start_plot_w - resizer_total_width;

                if (new_py_result_width > 50 && new_js_result_width > 50) {
                    // flex-grow等を無効化しつつ幅を指定 (flex: 0 0 Xpx)
                    py_result_area_element.style.flex = `0 0 ${new_py_result_width}px`;
                    js_result_area_element.style.flex = `0 0 ${new_js_result_width}px`;
                }
            }, () => {
                // onStart: ドラッグ開始時に全要素の現在の幅を取得し、固定幅モード(flex-grow:0)に移行させる
                start_py_result_w = py_result_area_element.offsetWidth;
                start_js_result_w = js_result_area_element.offsetWidth;
                start_plot_w = extension_area_element.offsetWidth;

                py_result_area_element.style.flex = `0 0 ${start_py_result_w}px`;
                js_result_area_element.style.flex = `0 0 ${start_js_result_w}px`;
                extension_area_element.style.flex = `0 0 ${start_plot_w}px`;
            });

            // 5. js_result_width // (js_result_area <-> extension_area)
            let start_js_result_w_2;
            let start_plot_w_2;
            let start_py_result_w_2; // 変数追加

            attach_drag_handler(footer_resizer_v2_element, (dx, dy) => {
                const new_js_result_width = start_js_result_w_2 + dx;
                const footer_width = footer_area_container_element.clientWidth;

                // 全体幅 - (左エリア固定幅 + 中央エリア新幅 + リサイザー合計幅) = 右エリア新幅
                const resizer_total_width = footer_resizer_v_element.offsetWidth + footer_resizer_v2_element.offsetWidth;
                const new_plot_width = footer_width - start_py_result_w_2 - new_js_result_width - resizer_total_width;

                if (new_js_result_width > 50 && new_plot_width > 50) {
                    // flex-grow等を無効化しつつ幅を指定
                    js_result_area_element.style.flex = `0 0 ${new_js_result_width}px`;
                    extension_area_element.style.flex = `0 0 ${new_plot_width}px`;
                }
            }, () => {
                // onStart: 同様に全要素を固定幅モードへ
                start_js_result_w_2 = js_result_area_element.offsetWidth;
                start_plot_w_2 = extension_area_element.offsetWidth;
                start_py_result_w_2 = py_result_area_element.offsetWidth;

                py_result_area_element.style.flex = `0 0 ${start_py_result_w_2}px`;
                js_result_area_element.style.flex = `0 0 ${start_js_result_w_2}px`;
                extension_area_element.style.flex = `0 0 ${start_plot_w_2}px`;
            });
        }

        //-------------------------------------------------------- ### Footer_Resizer_Logic ###
        // footer_area_height (editor <-> footer)
        function setup_footer_resizer() {
            const footer = document.querySelector("footer");
            let start_h;
            attach_drag_handler(footer_resizer_h_element, (dx, dy) => {
                // footerは上に伸ばすとdyがマイナスになるため反転
                const newHeight = start_h - dy;
                if (newHeight > 50 && newHeight < window.innerHeight - 100) {
                    footer.style.height = `${newHeight}px`;

        //-------------------------------------------------------- ### Editor_Drag&Drop_Logic ###
        function setup_editor_drag_and_drop() {
            const editor_div = document.getElementById("editor");

            // ドラッグ中
            editor_div.addEventListener("dragover", (e) => {
                e.preventDefault();
                e.stopPropagation();
                editor_div.classList.add("editor-dragover");
                e.dataTransfer.dropEffect = "copy"; // マウスカーソルを「コピー」表示に
            });

            // ドラッグアウト
            editor_div.addEventListener("dragleave", (e) => {
                e.preventDefault();
                e.stopPropagation();
                editor_div.classList.remove("editor-dragover");
            });

            // ドロップ
            editor_div.addEventListener("drop", async (e) => {
                e.preventDefault();
                e.stopPropagation();
                editor_div.classList.remove("editor-dragover");

                const files = e.dataTransfer.files;
                if (!files || files.length === 0) return;

                // 複数ドロップされても、エディターには最初の1つだけを表示する
                const file = files[0];

                // テキストファイルとして読み込む
                try {
                    js_result_area_element.value = `Reading ${file.name}...`;
                    const text = await file.text(); // ファイルの中身をテキストとして取得

                    update_editor_with_content(file.name, text, "DragDrop");

                } catch (err) {
                    console.error("File Read Error:", err);
                    js_result_area_element.value = "Error: Failed to read file text.";
                    alert("テキストファイルの読み込みに失敗しました。\nバイナリファイル等は開けません。");
                }
            });
        }

        //-------------------------------------------------------- ### VFS_Drag&Drop_Logic ###
        // 注意: sandbox iframe (srcdoc / null origin) では DirectoryEntry.readEntries が
        // EncodingError (Data URL 長制限) で失敗する。フォルダ DnD はホスト側 Entry API で読み、
        // postMessage で IDE に転送して VFS へ書き込む（本線）。
        // IDE 側は内部移動・FileList フォールバック・ヒットテスト・書き込みのみ担当する。

        /** 外部 OS からのファイル DnD か（VFS/Script 内部移動ではないか） */
        function is_external_file_drag(event) {
            const types = Array.from((event.dataTransfer && event.dataTransfer.types) || []);
            if (!types.includes("Files")) return false;
            if (types.includes("application/vfs-path")) return false;
            if (types.includes("application/script-path")) return false;
            return true;
        }

        /** VFS コンテナの矩形をホストへ通知（オーバーレイ位置決め用） */
        function report_vfs_drop_zone_rect() {
            if (!vfs_container_element) return;
            const r = vfs_container_element.getBoundingClientRect();
            js_post_message("vfs_drop_zone_rect", "host", "*", {
                left: r.left,
                top: r.top,
                width: r.width,
                height: r.height
            }, []);
        }

        /** Script コンテナの矩形をホストへ通知 */
        function report_script_drop_zone_rect() {
            if (!script_container_element) return;
            const r = script_container_element.getBoundingClientRect();
            js_post_message("script_drop_zone_rect", "host", "*", {
                left: r.left,
                top: r.top,
                width: r.width,
                height: r.height
            }, []);
        }

        /** VFS / Script 両ゾーンの矩形をホストへ通知 */
        function report_all_explorer_drop_zone_rects() {
            report_vfs_drop_zone_rect();
            report_script_drop_zone_rect();
        }

        let last_vfs_external_drag_notify_ms = 0;
        let last_script_external_drag_notify_ms = 0;

        /** ホストに外部 DnD 中であることを伝え、オーバーレイを出させる（VFS） */
        function notify_host_vfs_external_drag() {
            report_vfs_drop_zone_rect();
            const now = Date.now();
            // 過剰な postMessage を抑制
            if (now - last_vfs_external_drag_notify_ms < 40) return;
            last_vfs_external_drag_notify_ms = now;
            js_post_message("vfs_external_drag_enter", "host", "*", {}, []);
        }

        /** ホストに外部 DnD 中であることを伝え、オーバーレイを出させる（Script） */
        function notify_host_script_external_drag() {
            report_script_drop_zone_rect();
            const now = Date.now();
            if (now - last_script_external_drag_notify_ms < 40) return;
            last_script_external_drag_notify_ms = now;
            js_post_message("script_external_drag_enter", "host", "*", {}, []);
        }

        /**
         * ホストからのヒットテスト要求: iframe 内座標 (x,y) のドロップ先パスを返す
         */
        function handle_vfs_dnd_hit_test(x, y) {
            // 前回の強調を解除
            document.querySelectorAll("#vfs_explorer_container .vfs_drop_target").forEach((el) => {
                el.classList.remove("vfs_drop_target");
            });
            if (vfs_container_element) {
                vfs_container_element.classList.remove("dragover");
            }

            const el = document.elementFromPoint(x, y);
            if (!el) {
                js_post_message("vfs_dnd_target", "host", "*", { path: null, in_vfs: false }, []);
                return;
            }

            const in_vfs = el.closest("#vfs_explorer_container");
            if (!in_vfs) {
                js_post_message("vfs_dnd_target", "host", "*", { path: null, in_vfs: false }, []);
                return;
            }

            const folder_row = el.closest("[data-vfs-folder-path]");
            let path = MOUNT_PATH;
            if (folder_row) {
                path = folder_row.getAttribute("data-vfs-folder-path") || MOUNT_PATH;
                folder_row.classList.add("vfs_drop_target");
            } else {
                // コンテナ直下（フォルダ行以外）→ ルート
                vfs_container_element.classList.add("dragover");
            }

            js_post_message("vfs_dnd_target", "host", "*", { path: path, in_vfs: true }, []);
        }

        /**
         * 相対パスを正規化し、危険なパスを弾く
         * @returns {string|null}
         */
        function normalize_vfs_relative_path(raw_path) {
            let rel = String(raw_path || "").replace(/\\/g, "/");
            while (rel.startsWith("/")) rel = rel.slice(1);
            if (!rel || rel.split("/").includes("..")) return null;
            return rel;
        }

        /**
         * ホストから受け取った { relative_path, data|is_directory } を VFS に書き込む
         * 既存内容は消さない（追加アップロード）
         */
        async function apply_host_vfs_drop_write(data) {
            const target_dir = data.target_dir || MOUNT_PATH;
            const files = Array.isArray(data.files) ? data.files : [];

            toggle_loading(true, "Processing Dropped Files...");
            js_result_area_element.value = "Processing dropped files...";
            vfs_container_element.classList.remove("dragover");
            document.querySelectorAll("#vfs_explorer_container .vfs_drop_target").forEach((el) => {
                el.classList.remove("vfs_drop_target");
            });

            try {
                if (!pyodide_js || !pyodide_js.FS) {
                    throw new Error("Pyodide FS is not ready.");
                }
                if (!pyodide_js.FS.analyzePath(target_dir).exists) {
                    pyodide_js.FS.mkdirTree(target_dir);
                }

                let count = 0;
                for (const f of files) {
                    const rel = normalize_vfs_relative_path(f.relative_path);
                    if (!rel) {
                        console.warn("Skipped unsafe path:", f.relative_path);
                        continue;
                    }
                    const vfs_path = `${target_dir}/${rel}`;

                    if (f.is_directory) {
                        try { pyodide_js.FS.mkdirTree(vfs_path); } catch (e) { /* 既存可 */ }
                        continue;
                    }

                    if (f.data == null) continue;

                    const dir_name = vfs_path.substring(0, vfs_path.lastIndexOf("/"));
                    if (dir_name) {
                        pyodide_js.FS.mkdirTree(dir_name);
                    }

                    // postMessage 経由の ArrayBuffer / Uint8Array 両対応
                    const bytes = f.data instanceof Uint8Array
                        ? f.data
                        : new Uint8Array(f.data);
                    pyodide_js.FS.writeFile(vfs_path, bytes);
                    count++;
                }

                is_mounted = true;
                mounted_dir_handle = null;
                refresh_vfs_explorer_view();
                js_result_area_element.value = `Dropped & Uploaded ${count} files.`;

            } catch (e) {
                console.error("apply_host_vfs_drop_write:", e);
                js_result_area_element.value = `Drop Error: ${e.message}`;
            } finally {
                toggle_loading(false);
            }
        }

        /**
         * IDE 内に直接 drop された場合のフォールバック（FileList のみ）
         * フォルダ階層は読めないため、単一/複数ファイル向け。フォルダはホスト本線を使う。
         * @param {DragEvent} event
         * @param {string} [target_dir]
         */
        async function handle_vfs_drop(event, target_dir) {
            event.preventDefault();
            vfs_container_element.classList.remove("dragover");

            // 内部移動はフォルダ行ハンドラ担当
            const src_path = event.dataTransfer.getData("application/vfs-path");
            if (src_path) {
                return;
            }

            const dest_dir = target_dir || MOUNT_PATH;
            const file_list = event.dataTransfer.files;

            // FileList が空 = フォルダ DnD の典型。ホストオーバーレイへ委譲済み想定
            if (!file_list || file_list.length === 0) {
                // オーバーレイが出る前の瞬間 drop に備え、最終通知
                notify_host_vfs_external_drag();
                js_result_area_element.value =
                    "Folder drop is handled by host. If nothing appeared, drop again on VFS area.";
                return;
            }

            toggle_loading(true, "Processing Dropped Files...");
            js_result_area_element.value = "Processing dropped files...";

            try {
                if (!pyodide_js.FS.analyzePath(dest_dir).exists) {
                    pyodide_js.FS.mkdirTree(dest_dir);
                }

                let count = 0;
                for (let i = 0; i < file_list.length; i++) {
                    const file = file_list[i];
                    // フォルダ偽ファイルをスキップ
                    if (!file.type && file.size % 4096 === 0 && file.size <= 4096) {
                        console.warn("Skipped folder or invalid file:", file.name);
                        continue;
                    }
                    const rel = normalize_vfs_relative_path(
                        (file.webkitRelativePath && file.webkitRelativePath.length > 0)
                            ? file.webkitRelativePath
                            : file.name
                    );
                    if (!rel) continue;

                    const vfs_path = `${dest_dir}/${rel}`;
                    const dir_name = vfs_path.substring(0, vfs_path.lastIndexOf("/"));
                    if (dir_name) {
                        pyodide_js.FS.mkdirTree(dir_name);
                    }
                    const buffer = await file.arrayBuffer();
                    pyodide_js.FS.writeFile(vfs_path, new Uint8Array(buffer));
                    count++;
                }

                is_mounted = true;
                mounted_dir_handle = null;
                refresh_vfs_explorer_view();
                js_result_area_element.value = `Dropped & Uploaded ${count} files.`;

            } catch (e) {
                js_result_area_element.value = `Drop Error: ${e.message}`;
            } finally {
                toggle_loading(false);
            }
        }

        function setup_drag_and_drop() {
            const drop_zone = document.getElementById("vfs_explorer_container");

            drop_zone.addEventListener("dragenter", (e) => {
                if (!is_external_file_drag(e)) return;
                // ホスト側オーバーレイを起動（フォルダ Entry API 用）
                notify_host_vfs_external_drag();
            });

            drop_zone.addEventListener("dragover", (e) => {
                e.preventDefault(); // drop を許可
                if (is_external_file_drag(e)) {
                    drop_zone.classList.add("dragover");
                    e.dataTransfer.dropEffect = "copy";
                    notify_host_vfs_external_drag();
                }
            });

            drop_zone.addEventListener("dragleave", (e) => {
                e.preventDefault();
                drop_zone.classList.remove("dragover");
            });

            // コンテナ直下へのドロップ（ホストオーバーレイが間に合わない場合のフォールバック）
            drop_zone.addEventListener("drop", (e) => {
                handle_vfs_drop(e);
            });

            // 初期矩形は setup_script_drag_and_drop と合わせて report_all で通知
            report_all_explorer_drop_zone_rects();
        }

        //-------------------------------------------------------- ### Script_Drag&Drop_Logic ###
        // フォルダ階層の本線はホスト Entry API（VFS と同様）。IDE はマージ・内部移動・FileList フォールバック。

        /**
         * ホストからのヒットテスト: Script 領域内のドロップ先 script_path を返す
         */
        function handle_script_dnd_hit_test(x, y) {
            document.querySelectorAll("#script_explorer_container .script_drop_target").forEach((el) => {
                el.classList.remove("script_drop_target");
            });
            if (script_container_element) {
                script_container_element.classList.remove("dragover");
            }

            const el = document.elementFromPoint(x, y);
            if (!el) {
                js_post_message("script_dnd_target", "host", "*", { path: "", in_script: false }, []);
                return;
            }

            const in_script = el.closest("#script_explorer_container");
            if (!in_script) {
                js_post_message("script_dnd_target", "host", "*", { path: "", in_script: false }, []);
                return;
            }

            // GitHub 表示中は受け入れない
            if (githubExplorerActive || scriptExplorerState.type === "github") {
                js_post_message("script_dnd_target", "host", "*", { path: "", in_script: false, disabled: true }, []);
                return;
            }

            const folder_row = el.closest("[data-script-folder-path]");
            let path = "";
            if (folder_row) {
                path = folder_row.getAttribute("data-script-folder-path") || "";
                folder_row.classList.add("script_drop_target");
            } else {
                script_container_element.classList.add("dragover");
            }

            js_post_message("script_dnd_target", "host", "*", { path: path, in_script: true }, []);
        }

        /**
         * ホストから受け取ったファイル群を Script ツリーへマージ
         */
        async function apply_host_script_drop_write(data) {
            if (githubExplorerActive || scriptExplorerState.type === "github") {

                        continue;

                    if (f.is_directory) {

                        continue;
                    }
                    if (f.data == null) continue;
                    const bytes = f.data instanceof Uint8Array

                        : new Uint8Array(f.data);
                    const base_name = rel.split("/").pop() || "file";

                notify_host_script_external_drag();
                js_result_area_element.value =

                return;

            toggle_loading(true, "Processing Script Drop...");
            js_result_area_element.value = "Processing dropped files for Script_Explorer...";

                    if (!file.type && file.size % 4096 === 0 && file.size <= 4096) {
                        console.warn("Skipped folder or invalid file:", file.name);
                        continue;
                    }
                    const rel = normalize_script_relative_path(
                        (file.webkitRelativePath && file.webkitRelativePath.length > 0)
                            ? file.webkitRelativePath

                    if (!rel) continue;
                    entries.push({ relativePath: rel, file: file });

        function handle_vfs_move(src_path, dest_folder_path) {
            if (src_path === dest_folder_path) return; // 自分自身への移動は無視

            // ファイル名を取得
            const file_name = src_path.split("/").pop();
            const new_path = `${dest_folder_path}/${file_name}`;

            // 移動先が現在の親フォルダと同じなら何もしない
            const current_dir = src_path.substring(0, src_path.lastIndexOf("/"));
            if (current_dir === dest_folder_path) return;

            try {
                // 親子関係のチェック（親を子の中に移動しようとしていないか）
                const normalizedSrc = src_path.endsWith("/") ? src_path : src_path + "/";
                if (dest_folder_path.startsWith(normalizedSrc)) {
                    throw new Error("Cannot move a parent folder into its own child.");
                }

                // 名前の衝突チェック（上書き確認、またはリネーム）
                if (pyodide_js.FS.analyzePath(new_path).exists) {
                    if (!confirm(`"${file_name}" already exists in destination.\nOverwrite?`)) {
                        return;
                    }
                    // 上書きの場合は先に削除が必要（renameは上書き動作が環境によるため安全策）
                    pyodide_js.FS.unlink(new_path);
                }

                // 移動実行
                pyodide_js.FS.rename(src_path, new_path);
                console.log(`Moved: ${src_path} -> ${new_path}`);

                // ビューを更新
                refresh_vfs_explorer_view();

            } catch (err) {
                console.error("Move Error:", err);
                alert(`Move Failed: ${err.message}`);
            }
        }

import ast

class AutoSleepInjector(ast.NodeTransformer):
	def __init__(self):
		self.in_async = True # async関数内にいるかどうかのフラグ

	# -----------------------------------------------------------------
	# 通常の def (同期関数) に入った場合の処理を追加
	# これがないと、async関数の中に入れ子で作った同期関数内のprintにも
	# awaitがついてしまい、SyntaxErrorになります。
	# -----------------------------------------------------------------
	def visit_FunctionDef(self, node):
		# 現在の状態を保存
		prev_async = self.in_async
		# 同期関数内なのでフラグを下ろす
		self.in_async = False

		self.generic_visit(node) # 子ノードを再帰的に処理

		# 抜けるときに元の状態に戻す
		self.in_async = prev_async
		return node
	# -----------------------------------------------------------------

	def visit_AsyncFunctionDef(self, node):
		# async関数に入ったらフラグを立てる
		prev_async = self.in_async
		self.in_async = True
		self.generic_visit(node) # 子ノードを再帰的に処理
		self.in_async = prev_async # 抜けるときにフラグを戻す
		return node

	def visit_Expr(self, node):
		# 式ノード（関数呼び出しなど）をチェック
		self.generic_visit(node)

		if not self.in_async:
			return node

		# print() 関数の呼び出し判定
		# (ここでの print は組み込み関数の print として扱います)
		if isinstance(node.value, ast.Call) and \
			isinstance(node.value.func, ast.Name) and \
			node.value.func.id == 'print':

			# 挿入するノードを作成: await asyncio.sleep(0) を挿入する
			sleep_node = ast.Expr(
				value=ast.Await(
                    value=ast.Call(
                        func=ast.Attribute(
                            value=ast.Name(id='asyncio', ctx=ast.Load()),
                            attr='sleep',
                            ctx=ast.Load()
                        ),
                        args=[ast.Constant(value=0)],
                        keywords=[]
                    )
				)
			)
		
			# 元のノード(print)とスリープノードのリストを返す
			# 実行順序: print(...) -> await asyncio.sleep(0)
			return [node, sleep_node]

		return node

		return ast.unparse(new_tree) # 書き換えたコードを文字列に戻す

            if rootModule in stdlibModules:

        return "\\n".join(installLines) + "\\n" + sourceCode

    except Exception as e:
        return f"# Auto Install Parse Error: {e}\\n" + sourceCode

def _inject_matplotlib_show():
    import matplotlib

    def custom_show(*args, **kwargs):
        # グラフのメタデータ（統計情報）を抽出してテキスト化
        try:
            currentAxes = plt.gca()

            # タイトルや軸ラベルの取得
            if currentAxes.get_title():
                plotSummary.append(f"Title: {currentAxes.get_title()}")
            if currentAxes.get_xlabel():
                plotSummary.append(f"X-Axis: {currentAxes.get_xlabel()}")
            if currentAxes.get_ylabel():
                plotSummary.append(f"Y-Axis: {currentAxes.get_ylabel()}")

            # 描画されているデータ（線グラフ等）の簡易統計値を抽出
            targetLines = currentAxes.get_lines()
            for i, currentLine in enumerate(targetLines):
                lineLabel = currentLine.get_label() or f"Line_{i + 1}"
                yData = currentLine.get_ydata()
                if len(yData) > 0:
                    plotSummary.append(f"- {lineLabel}: points={len(yData)}, yMin={min(yData)}, yMax={max(yData)}")

            # 抽出したメタデータを標準出力経由でGemini nanoに届くログに流す
            print("\\n".join(plotSummary))
        except Exception as metaError:
            print(f"[Matplotlib Metadata Error]: {metaError}")

        buf = io.BytesIO()
        plt.savefig(buf, format="png")
        buf.seek(0)
        img_str = base64.b64encode(buf.read()).decode("utf-8")
        js.js_add_plot_image(img_str)
        plt.clf()

            const attachDragHandler = (element, onDrag, onStart, onEnd) => {
                if (!element) return;
                const startDrag = (e) => {
                    e.preventDefault();
                    let startX = e.clientX;
                    let startY = e.clientY;
                    if (onStart) onStart();
                    const onMouseMove = (moveEvent) => {
                        const dx = moveEvent.clientX - startX;
                        const dy = moveEvent.clientY - startY;
                        if (onDrag) onDrag(dx, dy);
                    };
                    const onMouseUp = () => {
                        document.removeEventListener("mousemove", onMouseMove);
                        document.removeEventListener("mouseup", onMouseUp);
                        if (onEnd) onEnd(); // ドラッグ終了時の処理を実行
                    };
                    document.addEventListener("mousemove", onMouseMove);
                    document.addEventListener("mouseup", onMouseUp);
                };
                element.addEventListener("mousedown", startDrag);
            };

            // AIサイドバーの幅をリサイズする処理
            let startAiSidebarWidth;
            const ideFrameElement = document.getElementById("ide_container");

            attachDragHandler(aiSidebarResizerVElement, (dx) => {
                // 右側サイドバーは左方向へのドラッグ（dxがマイナス）で幅が広がるため減算する
                const newWidth = startAiSidebarWidth - dx;
                if (newWidth > 150) {
                    aiSidebarElement.style.width = `${newWidth}px`;
                }
            }, () => {
                startAiSidebarWidth = aiSidebarElement.offsetWidth;
                // ドラッグ開始時: 高速ドラッグでマウスがiframeに入り込んでも追従が切れないようガードする
                if (ideFrameElement) {
                    ideFrameElement.style.pointerEvents = "none";
                }
            }, () => {
                // ドラッグ終了時: iframeのポインタイベントを元の状態に戻す

            const GITHUB_OAUTH_WORKER_ORIGIN = "https://pyodide-ide-github-oauth.admin-hide.workers.dev";
			const GITHUB_API_BASE = "https://api.github.com";
			const GITHUB_TREE_FILE_LIMIT = 5000;

            const githubFeatureEnabled = (() => {

            let githubAccessToken = null;

            let githubOAuthCodeVerifier = null;

            // --- PKCE / 乱数 ---
            function githubRandomString(length) {
                const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
                const values = new Uint8Array(length);
                crypto.getRandomValues(values);
                let result = "";
                for (let i = 0; i < length; i++) {
                    result += charset[values[i] % charset.length];
                }
                return result;
            }

            function githubBufferToBase64Url(buffer) {
                const bytes = new Uint8Array(buffer);
                let binary = "";
                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
            }

            async function githubSha256Base64Url(text) {
                const data = new TextEncoder().encode(text);
                const digest = await crypto.subtle.digest("SHA-256", data);
                return githubBufferToBase64Url(digest);
            }

            // --- GitHub REST ラッパ（ホスト専任・token は Authorization のみ） ---
            async function githubApiFetch(path, options = {}) {
                if (!githubAccessToken) {
                    throw new Error("GitHub にログインしていません。");
                }
                const url = path.startsWith("http") ? path : (GITHUB_API_BASE + path);
                const headers = Object.assign({
                    "Accept": "application/vnd.github+json",
                    "Authorization": "Bearer " + githubAccessToken,
                    "X-GitHub-Api-Version": "2022-11-28"
                }, options.headers || {});
                const res = await fetch(url, Object.assign({}, options, { headers }));
                if (!res.ok) {
                    let detail = "";
                    try {
                        const errBody = await res.json();
                        detail = errBody.message || JSON.stringify(errBody);
                    } catch (e) {
                        detail = await res.text();
                    }
                    throw new Error("GitHub API " + res.status + ": " + detail);
                }
                if (res.status === 204) return null;
                return res.json();
            }

            async function githubFetchUser() {
                const user = await githubApiFetch("/user");
                githubUserLogin = user.login || null;
                return user;
            }

            async function githubFetchRepos() {
                // 直近更新のリポジトリを取得（最大100）
                const repos = await githubApiFetch("/user/repos?per_page=100&sort=updated");
                return Array.isArray(repos) ? repos : [];
            }

            function githubBuildNestedTree(flatTree) {
                const root = [];
                let blobCount = 0;
                const entries = Array.isArray(flatTree) ? flatTree : [];
                for (let i = 0; i < entries.length; i++) {
                    const entry = entries[i];
                    if (!entry || entry.type !== "blob") continue;
                    blobCount++;
                    if (blobCount > GITHUB_TREE_FILE_LIMIT) {
                        break;
                    }
                    const parts = String(entry.path || "").split("/").filter(Boolean);
                    if (parts.length === 0) continue;
                    let currentList = root;
                    for (let p = 0; p < parts.length; p++) {
                        const name = parts[p];
                        const isFile = p === parts.length - 1;
                        if (isFile) {
                            currentList.push({
                                name: name,
                                type: "file",
                                path: entry.path,
                                sha: entry.sha || null
                            });
                        } else {
                            let folder = null;
                            for (let k = 0; k < currentList.length; k++) {
                                if (currentList[k].type === "folder" && currentList[k].name === name) {
                                    folder = currentList[k];
                                    break;
                                }
                            }
                            if (!folder) {
                                folder = {
                                    name: name,
                                    type: "folder",
                                    path: parts.slice(0, p + 1).join("/"),
                                    children: []
                                };
                                currentList.push(folder);
                            }
                            currentList = folder.children;
                        }
                    }
                }
                function sortTree(list) {
                    list.sort(function (a, b) {
                        if (a.type !== b.type) return a.type === "folder" ? -1 : 1;
                        return a.name.localeCompare(b.name);
                    });
                    for (let i = 0; i < list.length; i++) {
                        if (list[i].children) sortTree(list[i].children);
                    }
                }
                sortTree(root);
                return {
                    tree: root,
                    truncated: blobCount > GITHUB_TREE_FILE_LIMIT,
                    fileCount: Math.min(blobCount, GITHUB_TREE_FILE_LIMIT)
                };
            }

            async function githubFetchRepoTree(owner, repo, branch) {
                const ref = await githubApiFetch(
                    "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo)
                    + "/git/ref/heads/" + encodeURIComponent(branch)
                );
                const commitSha = ref.object && ref.object.sha;
                if (!commitSha) throw new Error("ブランチの tip commit を取得できませんでした。");
                const commit = await githubApiFetch(
                    "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo)
                    + "/git/commits/" + commitSha
                );
                const treeSha = commit.tree && commit.tree.sha;
                if (!treeSha) throw new Error("tree SHA を取得できませんでした。");
                const treeResp = await githubApiFetch(
                    "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo)
                    + "/git/trees/" + treeSha + "?recursive=1"
                );
                const built = githubBuildNestedTree(treeResp.tree || []);
                return {
                    tree: built.tree,
                    truncated: built.truncated || treeResp.truncated === true,
                    fileCount: built.fileCount,
                    commitSha: commitSha,
                    treeSha: treeSha
                };
            }

            async function githubFetchFileContent(owner, repo, path, branch) {
                const url = "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo)
                    + "/contents/" + path.split("/").map(encodeURIComponent).join("/")
                    + "?ref=" + encodeURIComponent(branch);
                const data = await githubApiFetch(url);
                if (data && data.type === "file" && typeof data.content === "string") {
                    // base64（改行含む）をデコード
                    const b64 = data.content.replace(/\n/g, "");
                    const binary = atob(b64);
                    const bytes = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                    const text = new TextDecoder("utf-8").decode(bytes);
                    return { content: text, sha: data.sha || null, path: data.path || path };
                }
                throw new Error("ファイル内容を取得できませんでした（ディレクトリの可能性）。");
            }

            /**
             * 複数ファイルを Git Data API で 1 コミットとして push（強制 push なし）
             */
            async function githubPushFiles(owner, repo, branch, message, files) {
                if (!files || files.length === 0) {
                    throw new Error("Push 対象ファイルがありません。GitHub から開いたタブを編集してください。");
                }
                const ref = await githubApiFetch(
                    "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo)
                    + "/git/ref/heads/" + encodeURIComponent(branch)
                );
                const baseCommitSha = ref.object.sha;
                const baseCommit = await githubApiFetch(
                    "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo)
                    + "/git/commits/" + baseCommitSha
                );
                const baseTreeSha = baseCommit.tree.sha;

                const treeItems = [];
                for (let i = 0; i < files.length; i++) {
                    const f = files[i];
                    const blob = await githubApiFetch(
                        "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo) + "/git/blobs",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ content: f.content, encoding: "utf-8" })
                        }
                    );
                    treeItems.push({
                        path: f.path,
                        mode: "100644",
                        type: "blob",
                        sha: blob.sha
                    });
                }

                const newTree = await githubApiFetch(
                    "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo) + "/git/trees",
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ base_tree: baseTreeSha, tree: treeItems })
                    }
                );

                const newCommit = await githubApiFetch(
                    "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo) + "/git/commits",
                    {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: message || "Update from Pyodide IDE",
                            tree: newTree.sha,
                            parents: [baseCommitSha]
                        })
                    }
                );

                // force: false 相当（既定）。fast-forward できない場合は API が失敗する
                await githubApiFetch(
                    "/repos/" + encodeURIComponent(owner) + "/" + encodeURIComponent(repo)
                    + "/git/refs/heads/" + encodeURIComponent(branch),
                    {
                        method: "PATCH",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ sha: newCommit.sha, force: false })
                    }
                );

                return { commitSha: newCommit.sha };
            }

            // --- UI ---
            function openGithubModal() {
                if (!githubFeatureEnabled || !githubModalOverlay) return;
                githubModalOverlay.classList.add("github_modal_visible");
                githubModalOverlay.setAttribute("aria-hidden", "false");

            function refreshGithubModalUi() {

                if (githubModalOpen) githubModalOpen.disabled = !loggedIn;

            async function populateRepoSelect() {
                if (!githubAccessToken) return;
                setGithubModalStatus("リポジトリ一覧を取得中…");
                const repos = await githubFetchRepos();
                if (!githubRepoSelect) return;
                githubRepoSelect.innerHTML = "";
                if (repos.length === 0) {
                    const opt = document.createElement("option");
                    opt.value = "";
                    opt.textContent = "（リポジトリがありません）";
                    githubRepoSelect.appendChild(opt);
                } else {
                    for (let i = 0; i < repos.length; i++) {
                        const r = repos[i];
                        const opt = document.createElement("option");

                        opt.dataset.defaultBranch = r.default_branch || "main";
                        githubRepoSelect.appendChild(opt);
                    }
                    // 既定ブランチを入力欄へ
                    const first = githubRepoSelect.options[0];
