        style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;

		connect-src 'self' https://script.google.com https://script.googleusercontent.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://pypi.org https://files.pythonhosted.org https://api.github.com https://pyodide-ide-github-oauth.admin-hide.workers.dev;
		frame-src 'self' blob: data:;

    <style id="root_style">
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #1e1e1e;
            color: #ccc;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            flex: 1;
            border: none;
            display: block;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            text-align: center;
        }

        #main_wrapper {
            display: flex;
            flex: 1;
            width: 100%;
            min-height: 0;
            overflow: hidden;
        }

        /* VFS 外部 DnD 用: ホスト側オーバーレイ（sandbox では Entry API 不可のためホストが受ける） */
        #host_vfs_drop_overlay {
            display: none;
            position: fixed;
            z-index: 100000;
            box-sizing: border-box;
            border: 2px dashed #888;
            background-color: rgba(68, 68, 68, 0.35);
            pointer-events: none;
        }
        #host_vfs_drop_overlay.active {
            display: block;
            pointer-events: auto; /* active 時のみ drop を受け取る */
        }

        .ai_sidebar_css {
            width: 350px;
            background-color: #252526;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            color: #fff;
            font-family: sans-serif;
            flex-shrink: 0;
        }

        body.ai-sidebar-hidden .ai_sidebar_css {
            display: none;
        }

        #ai_sidebar_resizer_v {
            width: 5px; /* リサイザーの幅 */
            cursor: ew-resize; /* 左右リサイズのカーソル表示 */
            background-color: #444; /* バーの背景色 */
            height: 100%; /* 高さいっぱいまで伸ばす */
            flex-shrink: 0; /* レイアウト崩れによる潰れ防止 */
        }

        body.ai-sidebar-hidden #ai_sidebar_resizer_v {
            display: none; /* AIサイドバー非表示時はリサイザーも隠す */
        }
    </style>

    <style id="header_style">
        header {
            /* ヘッダーのスタイル */
            background-color: #333;
            /* 背景色: やや暗いグレー */
            padding: 4px 5px;
            /* 内部パディング (上下4px, 左右5px) */
            display: flex;
            /* Flexboxコンテナとして設定 */
            justify-content: space-between;
            /* 子要素 (ボタンとステータス) を両端に配置 */
            align-items: center;
            /* 子要素を垂直方向の中央に揃える */
            flex-shrink: 0;
            /* 縮小を禁止（高さ固定） */
            position: relative;
            /* z-indexを効かせるために必要 */
            z-index: 10000;
            /* Z軸の深さ: ローディングオーバーレイ (9999) より前面に表示 */
        }

        .other_button_css,
        .run_button_css,
        .stop_button_css {
            /* ヘッダーボタンの共通スタイル */
            width: 35px;
            /* 幅: 35px */
            height: 25px;
            /* 高さ: 25px */
            border-radius: 5%;
            /* 角丸: 5% */
            font-size: 10pt;
            /* フォントサイズ: 10pt */
            text-align: center;
            /* テキストを中央揃え */
            cursor: pointer;
            /* カーソル: ポインター */
            margin-right: 3px;
            /* 右マージン: 3px */
            line-height: 1em;
            /* 行の高さ: 親要素と同じ */
            opacity: 0.9;
            /* 不透明度: 90% */
            transition: .3s;
            /* トランジション: 0.3秒 */
            box-shadow: 2px 2px 1px rgba(0, 0, 0, 0.3);
            /* ボックスシャドウ */
            /* ...既存のプロパティ... */
            display: inline-flex;
            /* inline-block から変更: SVGを中央配置しやすくするため */
            align-items: center;
            /* 垂直中央 */
            justify-content: center;
            /* 水平中央 */
            line-height: 0;
            /* 既存の 1em から 0 に変更してテキスト用の余白を消す */
            vertical-align: middle;
            /* テキスト有無による高さズレを解消 */
        }

        .other_button_css:hover,
        .run_button_css:hover,
        .stop_button_css:hover {
            box-shadow: none;
            /* ホバー時のボックスシャドウを解除 */
            opacity: 1;
            /* ホバー時の不透明度: 100% */
        }

        .other_button_css {
            /* ヘッダーの一般ボタンのスタイル */
            background: rgba(40, 40, 40, 1);
            /* 背景色: 暗いグレー (不透明) */
            color: rgba(210, 210, 210, 1);
            /* 文字色: 白 */
        }

        .run_button_css {
            /* ヘッダーの実行ボタンのスタイル */
            background: rgba(120, 200, 180, 1);
            /* 背景色: 緑がかった青 (不透明) */
            color: rgba(50, 50, 50, 1);
            /* 文字色: 白 */
        }

        .stop_button_css {
            /* ヘッダーの実行ボタンのスタイル */
            background: rgba(217, 83, 79, 1);
            /* 背景色: 緑がかった青 (不透明) */
            color: rgba(50, 50, 50, 1);
            /* 文字色: 白 */
        }

        .other_selector_css,
        .other_input_css {
            border: 1px solid #555;
            border-radius: 5%;
            /* 角丸: 5% */
            font-size: 10pt;
            /* フォントサイズ: 10pt */
            background: rgba(40, 40, 40, 1);
            /* 背景色: 暗いグレー (不透明) */
            color: rgba(255, 255, 255, 1);
            /* 文字色: 白 */
            padding: 2px 3px;
            /* 内部パディング (上下2px, 左右3px) */
        }

        /* ### GitHub 連携モーダル ### */
        #github_modal_overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        #github_modal_overlay.github_modal_visible {
            display: flex;
        }

        #github_modal {
            width: min(480px, 92vw);
            max-height: 80vh;
            overflow: auto;
            background: #2d2d2d;
            border: 1px solid #555;
            border-radius: 8px;
            padding: 16px 18px;
            color: #ddd;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
            font-size: 13px;
        }

        #github_modal h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #fff;
        }

        #github_modal .github_modal_row {
            margin: 8px 0;
        }

        #github_modal label {
            display: block;
            margin-bottom: 4px;
            color: #aaa;
            font-size: 12px;
        }

        #github_modal select,
        #github_modal input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            background: #1e1e1e;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px 8px;
        }

        #github_modal .github_modal_actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        #github_modal .github_modal_actions button {
            background: #3a3a3a;
            color: #eee;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
        }

        #github_modal .github_modal_actions button:hover:not(:disabled) {
            background: #4a4a4a;
        }

        #github_modal .github_modal_actions button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        #github_modal .github_modal_actions button.github_primary {
            background: #2d6a4f;
            border-color: #40916c;
        }

        #github_modal #github_modal_status {
            margin-top: 10px;
            min-height: 1.2em;
            color: #9cdcfe;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #github_connect.github_logged_in {
            color: #7dcea0;
        }
    </style>

</head>

            white-space: nowrap; /* テキストの折り返しを禁止 */
            overflow: hidden; /* はみ出した部分を隠す */
            text-overflow: ellipsis; /* はみ出したテキストを三点リーダーで表示 */
            margin-right: 8px; /* 右マージン: 8px */
		}
		.tab_close_btn {
            /* タブを閉じるボタン */
            border-radius: 50%; /* 角丸: 円形 */
            width: 16px; /* 幅: 16px */
            height: 16px; /* 高さ: 16px */
            text-align: center; /* テキストを中央揃え */
            line-height: 14px; /* 行の高さ: 14px */
            font-size: 12px; /* フォントサイズ: 12px */
            color: #ccc; /* 文字色: 薄いグレー */
            margin-left: auto; /* 左マージンを自動にし、要素を右寄せ */
		}
		.tab_close_btn:hover {
            background-color: #444; /* ホバー時の背景色: 濃いグレー */
            color: #fff; /* ホバー時の文字色: 白 */
		}
		.tab_unsaved_indicator {
            /* 未保存インジケーター（通常は非表示） */
            font-size: 18px; /* フォントサイズ: 18px */
            line-height: 10px; /* 行の高さ: 10px */
            margin-left: 5px; /* 左マージン: 5px */
            display: none; /* 要素を非表示 */
		}
		.tab_plus_btn {
            /* 新規タブを追加するボタン */
            display: flex; /* Flexboxコンテナとして設定 */
            align-items: center; /* 子要素を垂直方向の中央に揃える */
            justify-content: center; /* 子要素を水平方向の中央に揃える */
            padding: 0 10px; /* 内部パディング (上下0, 左右10px) */
            height: 100%; /* 高さ: 親要素いっぱいに */
            background-color: transparent; /* 背景色: 透明 */
            color: #969696; /* 文字色: グレー */
            font-size: 16px; /* フォントサイズ: 16px */
            cursor: pointer; /* カーソル: ポインター */
            min-width: 30px; /* 最小幅: 30px */
            border-right: 1px solid #252526; /* 右境界線: 1px 非常に暗いグレーの実線 */
            user-select: none; /* ユーザーによる選択を禁止 */
		}
		.tab_plus_btn:hover {
            background-color: #383838; /* ホバー時の背景色: 暗いグレー */
            color: #fff; /* ホバー時の文字色: 白 */
		}

		/* ### Resizer Styles (リサイズバーのスタイル) ### */

		/* Sidebar <-> Editor の垂直リサイズバー */
		#sidebar_resizer_v {
            width: 5px; /* 幅: 5px */
            cursor: ew-resize; /* カーソル: 左右リサイズカーソル */
            background-color: #444; /* 背景色: 濃いグレー */
            height: 100%; /* 高さ: 親要素いっぱいに */
		}

		/* Script_Explorer <-> VFS_Explorer の水平リサイズバー */
		#sidebar_resizer_h {
            height: 5px; /* 高さ: 5px */
            cursor: ns-resize; /* カーソル: 上下リサイズカーソル */
            background-color: #444; /* 背景色: 濃いグレー */
            flex-shrink: 0; /* 縮小を禁止（高さ固定） */
		}

		/* VFS_Explorer <-> Outline の水平リサイズバー */
		#sidebar_resizer_h2 {
            height: 5px; /* 高さ: 5px */
            cursor: ns-resize; /* カーソル: 上下リサイズカーソル */
            background-color: #444; /* 背景色: 濃いグレー */
            flex-shrink: 0; /* 縮小を禁止（高さ固定） */
		}

		#footer_resizer_h { /* Editor <-> Footer の水平リサイズバー */
            height: 5px; /* 高さ: 5px */
            cursor: ns-resize; /* カーソル: 上下リサイズカーソル */
            background-color: #444; /* 背景色: 濃いグレー */
            flex-shrink: 0; /* 縮小を禁止（潰れないようにする） */
            width: 100%; /* 幅: 100% */
		}

		/* ### Sidebar Layout (サイドバーのレイアウト) ### */
		#sidebar_area_container {
            /* サイドバー全体のコンテナ (Script_Explorer + VFS_Explorer + Outline) */
            width: 280px; /* 初期幅: 280px */
            min-width: 150px; /* 最小幅: 150px */
            background-color: rgb(30, 30, 30); /* 背景色: 暗いグレー */
            display: flex; /* Flexboxコンテナとして設定 */
            flex-direction: column; /* 子要素を縦方向に配置 */
            overflow: hidden; /* はみ出しを隠す */
            flex-shrink: 0; /* 縮小を禁止（サイドバー幅拡大を可能にする） */
		}

		/* サイドバー内の各パネルの共通スタイル */
		#script_explorer_container, #vfs_explorer_container, #outline_container {
            padding: 10px; /* 内部パディング */
            box-sizing: border-box; /* パディングを幅と高さに含める */
            overflow-y: auto; /* 縦スクロール可能 */
            flex-shrink: 1; /* 縮小を許可 */
            flex-grow: 1; /* 拡大を許可 */
		}
		#script_explorer_container {
			  flex-basis: 25%; /* 初期基準高さ: 25% (Script Explorerの初期高さの割合) */
		}
		#vfs_explorer_container {
		  	flex-basis: 25%; /* 初期基準高さ: 25% (VFS Explorerの初期高さの割合) */
		}
		#outline_container {
		  	flex-basis: 50%; /* 初期基準高さ: 50% (Outlineの初期高さの割合) */
		}

		/* サイドバー内のセクション見出し (h3) */
		#sidebar_area_container h3 {
            margin: 0 0 10px 0; /* マージン (上:0, 左右:0, 下:10px) */
            font-size: 14px; /* フォントサイズ: 14px */
            color: #ccc; /* 文字色: 薄いグレー */
            border-bottom: 1px solid #555; /* 下境界線: 1px 濃いグレーの実線 */
            padding-bottom: 5px; /* 下部パディング: 5px */
		}

		/* ### File Explorer Styles (ファイルエクスプローラーのスタイル) ### */
		#script_explorer ul, #vfs_explorer ul { /* ツリー構造のリスト */
            list-style: none; /* リストのマーカーを非表示 */
            padding-left: 15px; /* 左パディング: 15px (インデント) */
            margin: 0; /* マージンをリセット */
		}
		/* li 自体のスタイルは構造用のみに残す */
		.explorer-item {
            /* 以前の padding, cursor, color, hover は item_row へ移動 */
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
		}
		/* テキストとアイコンを含む「行」のスタイル */
		.item_row {
            padding: 4px; /* 内部パディング */
            cursor: pointer; /* カーソル */
            color: #ddd; /* 文字色 */
            display: block; /* ブロック表示で幅いっぱいにする */
            border-radius: 3px; /* 少し角丸に */
		}
		/* ホバー時の背景色は「行」に対して適用 */
		.item_row:hover {
			background-color: #555; /* ホバー時の背景色: 濃いグレー */
		}
		/* クリック選択時のスタイル */
		.item_row.selected_item {
            background-color: #007acc; /* 選択時: 青色 (VSCode風) */
            color: white; /* 文字色を白で強調 */
		}

		/* アイコン（:before疑似要素）は item_row に対して適用 */
		.item_row::before {
            font-family: "Consolas", monospace; /* アイコン用のフォント */
            margin-right: 8px; /* 右マージン */
            width: 16px; /* 幅 */
            display: inline-block;
            text-align: center;
		}
		/* フォルダかどうかは親の li (.folder-item) で判断し、アイコンは子の .item_row に出す */
		.folder-item > .item_row::before {
		  	content: "📁"; /* フォルダアイコン */
		}
		.folder-item.expanded > .item_row::before {
		  	content: "📂"; /* 展開されたフォルダアイコン */
		}
		.file-item > .item_row::before {
		  	content: "📄"; /* 一般ファイルアイコン */
		}
		.python-file > .item_row::before {
		  	content: "🐍"; /* Pythonファイルアイコン */
		}

		.folder-item.collapsed > ul {
		  	display: none; /* 閉じているフォルダの子要素 (ul) を非表示 */
		}

		/* ### Outline Styles (アウトラインのスタイル) ### */
		.outline-item {
            /* アウトラインの基本アイテム */
            padding: 1px; /* 内部パディング: 1px */
            cursor: pointer; /* カーソル: ポインター */
            color: #fff; /* 文字色: 白 */
            display: flex; /* Flexboxコンテナとして設定 */
            align-items: center; /* 子要素を垂直方向の中央に揃える */
            font-size: 14px; /* フォントサイズ: 14px */
		}
		.outline-item:hover {
			background-color: rgb(150, 150, 150); /* ホバー時の背景色: 中程度のグレー */
		}
		.class-item {
            /* クラス定義のアイテム */
            color: rgb(30, 170, 30); /* 文字色: 緑系 */
            font-size: 16px; /* フォントサイズ: 16px */
		}
		.function-item {
            /* 関数/メソッド定義のアイテム */
            color: rgb(30, 120, 170); /* 文字色: 青系 */
            padding-left: 15px; /* 左パディング: 15px (クラスよりインデント) */
            font-size: 16px; /* フォントサイズ: 16px */
		}

		/* ### Button Styles (各種ボタンのスタイル) ### */
		.sidebar_button_css {
            /* サイドバー内のボタンの共通スタイル */
            display: inline-flex; /* inline-block から変更: SVGを中央配置しやすくするため */
            width: 30px; /* 幅: 30px */
            height: 20px; /* 高さ: 20px */
            border-radius: 5%; /* 角丸: 5% */
            font-size: 1em; /* フォントサイズ: 親要素と同じ */
            margin-right: 3px; /* 右マージン: 3px */
            text-align: center; /* テキストを中央揃え */
            align-items: center;  /* 垂直中央 */
            justify-content: center; /* 水平中央 */
            cursor: pointer; /* カーソル: ポインター */
            padding: 0px 0px; /* 内部パディング: 0 */
            background: rgba(30, 30, 30, 1); /* 背景色: 暗いグレー (不透明) */
            color: #ccc; /* 文字色: 薄いグレー */
            line-height: 1em; /* 行の高さ: 親要素と同じ */
            opacity: 1; /* 不透明度: 100% */
            vertical-align: middle; /* 垂直方向の中央揃え */
            transition: .1s; /* トランジション: 0.1秒 */
		}
		.sidebar_button_css:hover {
            box-shadow: none; /* ホバー時のボックスシャドウを解除 */
            opacity: 1; /* ホバー時の不透明度: 100% */
		}

		/* VFS / Script エリアのドラッグオーバー時の視覚効果 */
		#vfs_explorer_container.dragover,
		#script_explorer_container.dragover {
            background-color: #444; /* 背景を少し明るく */
            border: 2px dashed #888; /* 境界線: 2px 濃いグレーの破線を表示 */
            opacity: 0.8; /* 不透明度: 80% */
		}
		/* エクスプローラ内部移動時のドロップターゲット強調 */
		.vfs_drop_target,
		.script_drop_target {
            background-color: #2a4d69 !important; /* 背景色: 青っぽく強調 (最優先) */
            border: 1px dashed #63ace5; /* 境界線: 1px 明るい青の破線 */
            color: white; /* 文字色: 白 */
		}

		.sidebar_button_container {
            /* サイドバーボタンのコンテナ（横並び用） */
            display: flex; /* Flexboxコンテナとして設定 */
            gap: 0px; /* アイテム間の隙間: 0px */
		}
		/* ### Sidebar Toggle Style (サイドバー切り替え) ### */
		/* bodyタグに "sidebar-hidden" クラスが付いた時のスタイル */
		body.sidebar-hidden #sidebar_area_container {
            display: none; /* サイドバーを非表示 */
		}
        body.sidebar-hidden #sidebar_resizer_v {
            display: none; /* サイドバー横のリサイズバーも非表示 */
		}

		/* ### Loading Overlay (ロード中画面) ### */
		#loading_overlay {
            position: fixed; /* 配置: 画面に固定 */
            top: 0; /* 上端から: 0 */
            left: 0; /* 左端から: 0 */
            width: 100%; /* 幅: 100% */
            height: 100%; /* 高さ: 100% */
            background-color: rgba(0, 0, 0, 0.5); /* 背景色: 半透明の黒背景 */
            z-index: 9999; /* Z軸の深さ: 最前面に表示 (ヘッダーより下) */
            display: none; /* デフォルトは非表示 */
            justify-content: center; /* 水平方向の中央揃え */
            align-items: center; /* 垂直方向の中央揃え */
            flex-direction: column; /* 子要素を縦方向に配置 */
            color: white; /* 文字色: 白 */
            font-size: 1.2em; /* フォントサイズ: 親要素の1.2倍 */
		}
		.spinner {
            /* 回転するローディングアニメーションの円 */
            border: 8px solid #f3f3f3; /* 境界線: 8px 薄いグレーの実線 */
            border-top: 8px solid #3498db; /* 境界線の上部: 8px 青色 (回転する部分) */
            border-radius: 50%; /* 形状: 円形 */
            width: 60px; /* 幅: 60px */
            height: 60px; /* 高さ: 60px */
            animation: spin 1s linear infinite; /* アニメーション: spin を 1秒かけて線形に無限に繰り返す */
            margin-bottom: 15px; /* 下部マージン: 15px */
		}
        @keyframes spin {
            /* スピナーの回転アニメーションの定義 */
            0% { transform: rotate(0deg); } /* 開始時: 0度回転 */
            100% { transform: rotate(360deg); } /* 終了時: 360度回転 */
		}
    </style>

	</head>

    <script id="script_js_call_by_pyodide">

        //-------------------------------------------------------- ### post_message (ide_frame_to_host_frame) 送信 ###
        function js_post_message(cmd, target = "host", origin = "*", obj = {}, args = []) {
            return new Promise((resolve, reject) => {
                console.log("# called_js_post_message :", cmd)

                if (target == "host") { // host_frame に post_message
                    const req_id = "req_" + Date.now() + "_" + Math.random().toString(36).substr(2, 9); // 一意のリクエストIDを生成
                    if (cmd == "fetch_post" || cmd == "serial_write") { // 応答待ちリストに登録
                        pending_host_requests[req_id] = { resolve, reject };
                    }
                    // host_frameウィンドウへメッセージ送信
                    const post_message_data = { "cmd": cmd, "req_id": req_id, "obj": obj, "args": args }
                    window.parent.postMessage(post_message_data, origin);

                } else if (target == "preview") { // preview_frame に post_message
                    const frame = document.getElementById("preview_frame");
                    if (frame && frame.contentWindow) {
                        // データはJSONシリアライズ可能なオブジェクトである必要があります
                        // "*" 指定により、サンドボックス化された(null originの)iframeにも送信可能
                        frame.contentWindow.postMessage(obj, origin);
                        // console.log("Sent to preview:", obj);
                        js_result_area.value = JSON.stringify(obj, null, 2);
                    }
                }
            });
        }

        function js_add_plot_image_old(base64_str) { // Base64画像を受け取って表示する関数

        //-------------------------------------------------------- ### JS_Plot_Display (New Tab Version) ###
        function js_add_plot_image(base64_str) {
            const PLOT_TAB_NAME = "Matplotlib_Plots";

            // 1. プロット用タブが既に存在するか確認
            let target_tab_id = null;
            for (const id in tabs_data) {
                if (tabs_data[id].name === PLOT_TAB_NAME) {
                    target_tab_id = id;
                    break;
                }
            }

            // 2. 存在しなければ新規作成 (type="plot"として作成)
            if (!target_tab_id) {
                // 第3引数に "plot" を渡して専用タブとして開く
                open_tab(PLOT_TAB_NAME, "", "plot");

                // open_tab内部で active_tab_id が更新されているはずだが、IDを取得し直す
                for (const id in tabs_data) {
                    if (tabs_data[id].name === PLOT_TAB_NAME) {
                        target_tab_id = id;
                        break;
                    }
                }
            }

            // 3. プロットタブをアクティブにする
            if (active_tab_id !== target_tab_id) {
                activate_tab(target_tab_id);
            }

            // 4. 画像要素を作成
            const img = document.createElement("img");
            img.src = "data:image/png;base64," + base64_str;

            // 5. コンテナに追加
            // activate_tab 済みなので plot_container_element が表示されている前提
            plot_container_element.appendChild(img);

            // 6. メモリ/表示枚数制限 (例: 最新20枚のみ保持)
            const max_plots = 20;
            while (plot_container_element.children.length > max_plots) {
                plot_container_element.removeChild(plot_container_element.firstChild);

            // 7. 最下部へスクロール
            plot_container_element.scrollTop = plot_container_element.scrollHeight;

            // js_result_area_element.value = "Plot added to 'Matplotlib_Plots' tab.\n" + js_result_area_element.value;

        //-------------------------------------------------------- ### js_encrypt_zipper ###
        /**
         * Pyodide VFS の内容をZIPとしてダウンロードします。
         * パスワードがある場合は暗号化、ない場合は標準ZIPとなります。
         * Pythonおよび右クリックメニューの両方から利用されます。
         */
        async function js_encrypt_zipper(path, save_name, pass_word, crypto_type) {

            const FORBIDDEN_EXTENSIONS = new Set([
                ".exe", ".scr", ".bat", ".cmd", ".sh", ".ps1", ".vbs",
                ".js", ".jar", ".com", ".msi", ".wsf", ".scf", ".lnk"
            ]);

            js_result_area_element.value = `Starting zip for: ${path}, Filename: ${save_name}, Pass: ${pass_word ? "Yes" : "No"}`;
            console.log(`Starting zip for: ${path}, Filename: ${save_name}, Pass: ${pass_word ? "Yes" : "No"}`);

            if (!pyodide_js || !pyodide_js.FS) {
                const msg = "Error: Pyodide FS is not initialized.";
                console.error(msg);
                js_result_area_element.value = msg;
                return;
            }
            if (typeof zip === "undefined") {
                const msg = "Error: zip.js is not loaded.";
                console.error(msg);
                js_result_area_element.value = msg;
                return;
            }

            // 危険拡張子チェック
            function validate_vfs_content(vfs_path) {
                let entries;
                try {
                    entries = pyodide_js.FS.readdir(vfs_path);
                } catch (e) {
                    console.warn(`Skipping validation for ${vfs_path}: ${e.message}`);
                    return true; // 読み込めない場所はスキップ（またはfalseで厳格にする）
                }

                for (const entry of entries) {
                    if (entry === "." || entry === "..") continue;

                    const full_vfs_path = `${vfs_path}/${entry}`;
                    let stat;
                    try {
                        stat = pyodide_js.FS.stat(full_vfs_path);
                    } catch (e) { continue; }

                    if (pyodide_js.FS.isDir(stat.mode)) {
                        // ディレクトリなら再帰チェック
                        if (!validate_vfs_content(full_vfs_path)) return false;
                    } else if (pyodide_js.FS.isFile(stat.mode)) {
                        // ファイルなら拡張子チェック
                        // ファイル名の最後のドット以降を取得して小文字化
                        const dotIndex = entry.lastIndexOf(".");
                        if (dotIndex !== -1) {
                            const ext = entry.substring(dotIndex).toLowerCase();
                            if (FORBIDDEN_EXTENSIONS.has(ext)) {
                                const warning = `Security Alert: Blocked forbidden file extension "${ext}" in file: ${full_vfs_path}`;
                                console.error(warning);
                                js_result_area_element.value = warning;
                                alert(`【セキュリティ警告】\n危険な形式のファイルが含まれているため、ZIP作成を中止しました。\n\n検出ファイル: ${entry}`);
                                return false; // 検知
                            }
                        }
                    }
                }
                return true; // 問題なし
            }
            if (!validate_vfs_content(path)) {
                return; // ブラックリストに抵触したため終了
            }

            let zip_writer = null;
            try {
                // 1. Writerの準備
                const blob_writer = new zip.BlobWriter("application/zip");
                // コンストラクタではオプションを指定せず、ファイル追加時に指定する方式に変更
                zip_writer = new zip.ZipWriter(blob_writer);

                // 2. ファイル追加時のオプション設定を作成
                const file_options = {};
                if (pass_word) {
                    file_options.password = pass_word;
                    if (crypto_type) {
                        file_options.zipCrypto = true; // Legacy ZipCrypto
                    } else {
                        file_options.encryptionStrength = 3; // AES-256
                    }
                }

                // 3. 再帰処理関数
                async function add_files_to_zip(vfs_path, path_in_zip) {
                    let entries;
                    try {
                        entries = pyodide_js.FS.readdir(vfs_path);
                    } catch (e) {
                        console.warn(`Skipping ${vfs_path}: ${e.message}`);
                        return;
                    }

                    for (const entry of entries) {
                        if (entry === "." || entry === "..") continue;

                        const full_vfs_path = `${vfs_path}/${entry}`;
                        const full_zip_path = path_in_zip ? `${path_in_zip}/${entry}` : entry;

                        let stat;
                        try {
                            stat = pyodide_js.FS.stat(full_vfs_path);
                        } catch (e) { continue; }

                        if (pyodide_js.FS.isDir(stat.mode)) {
                            // ディレクトリ: パスワード不要
                            await zip_writer.add(full_zip_path + "/", null, { directory: true });
                            await add_files_to_zip(full_vfs_path, full_zip_path);

                        } else if (pyodide_js.FS.isFile(stat.mode)) {
                            // ファイル: パスワード設定(file_options)を適用
                            // パスワードがnullの場合は空オブジェクトが渡され、通常ZIPになる
                            const file_data = pyodide_js.FS.readFile(full_vfs_path);
                            await zip_writer.add(full_zip_path, new zip.Uint8ArrayReader(file_data), file_options);
                        }
                    }
                }

                // 4. 実行
                await add_files_to_zip(path, "");

                // 5. 終了・ダウンロード
                const zip_blob = await zip_writer.close();
                zip_writer = null;
                js_download_file(zip_blob, save_name, "application/zip");

                js_result_area_element.value = `Zip created: ${save_name}`;

            } catch (err) {
                console.error("Zip Error:", err);
                js_result_area_element.value = `Error: ${err.message}`;
                alert(`ZIP作成エラー:\n${err.message}`);

            } finally {
                if (zip_writer) { // エラー発生時など、まだ閉じられていない場合のみ実行
                    try {
                        await zip_writer.close();
                        js_result_area_element.value = "zip_writer closed via finally block.";
                        console.log("zip_writer closed via finally block.");
                    } catch (e) {
                        js_result_area_element.value = "Error closing zip_writer in finally:" + e;
                        console.error("Error closing zip_writer in finally:", e);
                    }
                }
            }
        }

        //-------------------------------------------------------- ### js_decrypt_zipper_vfs ###
        /**
         * VFS上の暗号化ZIPを読み込み、パスワードを解除した標準ZIPに変換してダウンロードする
         * @param {string} input_vfs_path - VFS上の暗号化ZIPのパス (例: "/mnt/secret.zip")
         * @param {string} output_zip_name - ダウンロードするファイル名 (例: "decrypted.zip")
         * @param {string} password - 解凍用パスワード
         */
        async function js_decrypt_zipper_vfs(input_vfs_path, output_zip_name, password) {
            js_result_area_element.value = `Reading ${input_vfs_path} from VFS...`;

            let zip_reader = null;
            let zip_writer = null;
            try {
                // 1. VFSから暗号化ZIPファイルをバイナリとして読み込む
                if (!pyodide_js.FS.analyzePath(input_vfs_path).exists) {
                    throw new Error(`File not found in VFS: ${input_vfs_path}`);
                }
                const file_data = pyodide_js.FS.readFile(input_vfs_path);

                // 2. 読み込み用(Reader)と書き込み用(Writer)の準備
                // Uint8ArrayReaderを使うことでメモリコピーを最小限に抑えます
                zip_reader = new zip.ZipReader(new zip.Uint8ArrayReader(file_data));
                const blobWriter = new zip.BlobWriter("application/zip");
                zip_writer = new zip.ZipWriter(blobWriter); // オプションなし＝標準ZIP(非暗号化)

                // 3. エントリ一覧取得
                const entries = await zip_reader.getEntries();
                js_result_area_element.value = `Decrypting ${entries.length} files...`;

                // 4. ストリーミング処理（1ファイルずつ 復号 -> 再圧縮）
                let count = 0;
                for (const entry of entries) {
                    if (entry.directory) {
                        await zip_writer.add(entry.filename, null, { directory: true });
                        continue;
                    }

                    // 進捗表示（重い処理なので重要）
                    if (count % 5 === 0) {
                        js_result_area_element.value = `Processing: ${entry.filename} ...`;
                    }

                    // A. 復号してデータを取り出す (パスワード使用)
                    // ここで展開されたデータは一時メモリにしか乗りません
                    const decrypted_data = await entry.getData(new zip.Uint8ArrayWriter(), {
                        password: password
                    });

                    // B. 標準ZIPに書き込む (パスワードなし)
                    await zip_writer.add(entry.filename, new zip.Uint8ArrayReader(decrypted_data));

                    count++;
                }

                // 5. 終了処理 & ダウンロード
                js_result_area_element.value = "Finalizing ZIP...";
                await zip_reader.close();
                const out_blob = await zip_writer.close();

                js_result_area_element.value = `Decrypted ZIP created. Size: ${out_blob.size}`;
                console.log(`Decrypted ZIP created. Size: ${out_blob.size}`);
                js_download_file(out_blob, output_zip_name, "application/zip");

                js_result_area_element.value = `Success! Downloaded ${output_zip_name}`;

            } catch (err) {
                js_result_area_element.value = "Decrypt Error:" + err;
                console.error("Decrypt Error:", err);
                js_result_area_element.value = `Error: ${err.message}`;
                alert(`解凍エラー: パスワードが違うか、ファイルが破損しています。\n${err.message}`);

            } finally {
                // エラー発生時でも確実に close する
                if (zip_reader) {
                    try { await zip_reader.close(); } catch (e) { }
                }
                if (zip_writer) {
                    try { await zip_writer.close(); } catch (e) { }
                }
            }
        }

        //-------------------------------------------------------- ### VFS_File_Download ###
        /**
         * Pyodide VFS 内の単一ファイルを読み込み、ブラウザのダウンロード機能をトリガーします。
         * @param {string} vfs_path - ダウンロード対象のVFSフルパス
         */
        function js_download_vfs_file(vfs_path) {
            // PyodideとFSの初期化確認
            if (!pyodide_js || !pyodide_js.FS) {
                console.error("Pyodide FS not ready.");
                return;
            }

            try {
                js_result_area_element.value = `Downloading ${vfs_path}...`;

                // ファイル名をパスから抽出
                const file_name = vfs_path.split("/").pop();

                // VFSからファイルをバイナリ(Uint8Array)として読み込む
                // ※ encodingを指定しないことでバイナリ取得となり、画像やzipなども破損せず扱えます
                const file_data = pyodide_js.FS.readFile(vfs_path);

                // 既存のダウンロードヘルパー関数を利用
                // MIMEタイプは自動判別が難しいため、汎用的なバイナリストリームとして扱います
                js_download_file(file_data, file_name, "application/octet-stream");

                js_result_area_element.value = `Download triggered for ${vfs_path}`;
                console.log(`Download triggered for ${vfs_path}`);

            } catch (err) {
                js_result_area_element.value = `Download Error: ${err.message}`;
                const msg = `Download Error: ${err.message}`;
                console.error(msg);
                js_result_area_element.value = msg;
                alert(msg);
            }
        }

        //-------------------------------------------------------- ### File_Download_Helper ###
        function js_download_file(data, filename, mime_type = "application/octet-stream") {
            let blob;
            if (data instanceof Uint8Array) {
                blob = new Blob([data], { type: mime_type });
            } else {
                // 文字列と仮定
                blob = new Blob([data], { type: mime_type });
            }

            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a); // Firefoxでの互換性のため
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        //-------------------------------------------------------- ### JS_Get_CSV_Data ###
        function js_get_csv_data(file_name) {
            // 1. 最優先：現在アクティブ（表示中）なタブが対象のファイル名かチェック
            if (active_tab_id && tabs_data[active_tab_id]) {
                const active_tab = tabs_data[active_tab_id];
                if (active_tab.name === file_name && active_tab.type === "spreadsheet") {
                    if (spreadsheet_instances[active_tab_id]) {
                        return spreadsheet_instances[active_tab_id].getData();
                    }
                }
            }

            // 2. 次点：アクティブなタブではない場合、開いている全タブの中から探す
            for (const tab_id in tabs_data) {
                if (tabs_data[tab_id].name === file_name && tabs_data[tab_id].type === "spreadsheet") {
                    if (spreadsheet_instances[tab_id]) {
                        return spreadsheet_instances[tab_id].getData();
                    }
                }
            }

            return null; // 開かれているタブの中に該当ファイルが見つからない場合
        }

        //-------------------------------------------------------- ### Monacoローダー ###
        function load_script(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.src = src;
                script.onload = () => resolve();
                script.onerror = (e) => reject(new Error(`Script load error for ${src}. Error: ${e}`));
                document.head.appendChild(script);
            });
        }

        /* #################### ↑↑↑ script_js_call_by_pyodide ↑↑↑ #################### */
    </script>

                // この関数の *内部* でconfigを設定します。
                require.config({ paths: { "vs": "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.49.0/min/vs" } });

                // Monaco Editorの本体（editor.main）を非同期で読み込む
                require(["vs/editor/editor.main"], function () {
                    // 読み込み完了後、エディタを生成・初期化する
                    editor = monaco.editor.create(editor_element, {
                        theme: "vs-dark",
                        language: "python",
                        automaticLayout: true, // ウィンドウリサイズ時に自動レイアウト調整
                    });

                    open_tab("main.py", initial_code);

                    // エディタの内容が変更されたら、アウトライン更新と構文チェックを実行する
                    let outline_timer = null;
                    editor.onDidChangeModelContent(() => {
                        clearTimeout(outline_timer);

                        // 入力から 300ms 後にアウトライン更新と構文チェック
                        outline_timer = setTimeout(() => {
                            // タブ閉鎖直後などモデルが無い場合はスキップ
                            if (!editor.getModel()) return;
                            const code = editor.getValue();
                            analyze_python_code(code);
                        }, 300);
                    });

                    // 初回のアウトライン生成と構文チェック
                    analyze_python_code(initial_code);

                    // これでMonacoの初期化がすべて完了したため、
                    // 待機している window.onload の await に処理を返す
                    resolve();
                });
            });
        }

        //-------------------------------------------------------- ### Create_&_Open_Tab ###
        // options: { forceUpdate?: boolean, githubPath?: string|null }
        function open_tab(file_name, content, is_preview = false, options = {}) {
            const forceUpdate = options && options.forceUpdate === true;
            const githubPathOpt = options && Object.prototype.hasOwnProperty.call(options, "githubPath")
                ? options.githubPath
                : undefined;

            // 既に同じ名前のタブが開いているか確認
            for (const id in tabs_data) {
                if (tabs_data[id].name === file_name) {
                    // プレビューの場合、コンテンツ(URL)を更新して再表示
                    if (is_preview && tabs_data[id].type === "preview") {
                        tabs_data[id].content = content; // URLを更新
                        activate_tab(id);
                        return;
                    }
                    // GitHub 再読込等: モデル内容を強制更新
                    if (forceUpdate && tabs_data[id].model && typeof content === "string") {
                        tabs_data[id].model.setValue(content);
                    }
                    if (githubPathOpt !== undefined) {
                        tabs_data[id].githubPath = githubPathOpt;
                    }
                    activate_tab(id);
                    return;
                }
            }

            const tab_id = `tab_${tab_counter++}`;

            // Monaco Modelの作成 (言語は拡張子から簡易判定、デフォルトはpython)
            // これにより各タブで Undo/Redo 履歴が保持されます
            let lang = "python";
            let type = "editor"; // "editor" or "preview"

            if (is_preview === true) {
                type = "preview";
            } else if (is_preview === "plot") { // "plot" という文字列が渡された場合
                type = "plot";
                lang = "text"; // プロット用なので言語は関係ない
            } else {
                // 拡張子から言語を決定
                if (file_name.endsWith(".py")) lang = "python";
                else if (file_name.endsWith(".json")) lang = "json";
                else if (file_name.endsWith(".js")) lang = "javascript";
                else if (file_name.endsWith(".html")) lang = "html";
                else if (file_name.endsWith(".css")) lang = "css";
                else if (file_name.endsWith(".txt")) lang = "text/plain";
                else if (file_name.endsWith(".csv")) {
                    lang = "csv";
                    type = "spreadsheet";
                }
                else lang = "text/plain";
            }

            // Monaco Modelの作成 (エディタモードの場合のみ)
            let new_model = null;
            if (type === "editor") {
                if (content !== "" || file_name !== "Untitled") {
                    new_model = monaco.editor.createModel(content, lang);
                }
            }

            // データ格納
            tabs_data[tab_id] = {
                name: file_name,
                model: new_model,
                type: type, // タブの種類
                content: content, // プレビューの場合はBlobURL、エディタの場合は初期値など
                scroll_state: null,
                githubPath: githubPathOpt !== undefined ? githubPathOpt : null // GitHub 上の相対パス（token は持たない）
            };

            // --- DOM要素の作成 ---
            const tab_div = document.createElement("div");
            tab_div.id = tab_id;
            tab_div.className = "tab_item";
            tab_div.title = file_name; // ホバー時にフルネーム表示

            enable_tab_drag_and_drop(tab_div); // タブのドラッグ移動を有効化

            // --- タブをクリックで切り替え ---
            tab_div.addEventListener("mousedown", (e) => {
                // ミドルクリック(1)で閉じる、左クリック(0)で切り替え
                if (e.button === 1) {
                    e.preventDefault();
                    close_tab(tab_id);
                } else if (e.button === 0) {
                    activate_tab(tab_id);
                }
            });

            // --- タブをダブルクリックでタブ名変更 ---
            tab_div.addEventListener("dblclick", (e) => {
                e.stopPropagation(); // クリック系イベントの干渉防止

                const old_name = tabs_data[tab_id].name;

                // 拡張子とファイル名を分離する処理
                const last_dot_idx = old_name.lastIndexOf(".");
                let base_name = old_name;
                let ext_name = "";
                // ドットが見つかり、かつ先頭ではない場合（隠しファイル等でない場合）
                if (last_dot_idx > 0) {
                    base_name = old_name.substring(0, last_dot_idx);
                    ext_name = old_name.substring(last_dot_idx);
                }
                // プロンプトには拡張子を除いた名前を表示し、メッセージで拡張子が固定であることを伝える
                const input_base_name = prompt(`Rename tab (extension '${ext_name}' is fixed)`, base_name);
                // キャンセル・空文字は無視
                if (!input_base_name) return;
                // ユーザー入力値と元の拡張子を結合
                const new_name = input_base_name + ext_name;

                // 同名は無視
                if (new_name === old_name) return;
                // データ更新
                tabs_data[tab_id].name = new_name;
                // 表示名更新
                const name_span = tab_div.querySelector(".tab_name");
                if (name_span) {
                    name_span.textContent = new_name;
                }

                // title 属性更新
                tab_div.title = new_name;

                // アクティブタブなら現在ファイル名も更新
                if (active_tab_id === tab_id) {
                    file_name_val = new_name;
                    const code = editor.getValue();
                    analyze_python_code(code);
                }
            });

            // タブ名
            const name_span = document.createElement("span");
            name_span.className = "tab_name";
            name_span.textContent = file_name;
            tab_div.appendChild(name_span);

            // 閉じるボタン
            const close_btn = document.createElement("span");
            close_btn.className = "tab_close_btn";
            close_btn.textContent = "[x]";
            close_btn.addEventListener("click", (e) => {
                e.stopPropagation(); // host_frameのクリックイベント伝播を防止
                close_tab(tab_id);
            });
            tab_div.appendChild(close_btn);

            if (tab_plus_button_element) {
                tab_bar_element.insertBefore(tab_div, tab_plus_button_element);
            } else {
                tab_bar_element.appendChild(tab_div);
            }

            // 作成したタブをアクティブにする
            activate_tab(tab_id);
        }

        //-------------------------------------------------------- ### Activate Tab ###
        function activate_tab(target_id) {
            if (!tabs_data[target_id]) return;

            active_tab_id = target_id;
            const data = tabs_data[target_id];

            // 1. タブの見た目を更新（activeクラスの付け替え）
            const all_tabs = document.querySelectorAll(".tab_item");
            all_tabs.forEach(el => el.classList.remove("active_tab"));

            const target_tab_el = document.getElementById(target_id);
            if (target_tab_el) {
                target_tab_el.classList.add("active_tab");
                target_tab_el.scrollIntoView({ behavior: "smooth", block: "nearest" });
            }

            const old_ui = document.getElementById("lang_select_box");
            if (old_ui) old_ui.remove();

            editor_element.style.display = "none";
            preview_container_element.style.display = "none";
            plot_container_element.style.display = "none";
            spreadsheet_container_element.style.display = "none";

            // 2. Monaco Editorのモデルを差し替え
            if (data.type === "preview") {
                // プレビューモード
                preview_container_element.style.display = "flex";
                // iframeのソースを設定 (contentにはBlob URLが入っている想定)
                preview_frame_element.src = data.content;
                file_name_val = data.name;

            } else if (data.type === "plot") {
                // --- プロットモード (新規追加) ---
                plot_container_element.style.display = "flex";
                file_name_val = data.name;

            } else if (data.type === "spreadsheet") {
                // --- スプレッドシートモード (CSV用) ---
                spreadsheet_container_element.style.display = "block";
                file_name_val = data.name;

                // 全スプレッドシートインスタンスを非表示化
                document.querySelectorAll(".spreadsheet_instance").forEach(el => el.classList.remove("active_spreadsheet"));

                if (!spreadsheet_instances[target_id]) {
                    // 初回表示時のみコンテナ生成とJspreadsheetの初期化
                    const sheet_div = document.createElement("div");
                    sheet_div.id = `sheet_${target_id}`;
                    sheet_div.className = "spreadsheet_instance active_spreadsheet";
                    spreadsheet_container_element.appendChild(sheet_div);

                    // CSV文字列を2次元配列に簡易変換
                    const parsed_data = data.content
                        ? data.content.trim().split("\n").map(row => row.split(","))
                        : [[]];

                    spreadsheet_instances[target_id] = jspreadsheet(sheet_div, {
                        data: parsed_data,
                        minDimensions: [10, 15],
                        defaultColWidth: 100,
                        parseFormulas: false
                    });
                } else {
                    // 既に作成済みの場合は表示クラスを付与
                    const sheet_div = document.getElementById(`sheet_${target_id}`);
                    if (sheet_div) sheet_div.classList.add("active_spreadsheet");
                }

            } else {
                // エディタモード
                editor_element.style.display = "block";

                const old_ui = document.getElementById("lang_select_overlay");
                if (old_ui) old_ui.remove();

                if (!data.model) {

                    // editor DOM の破壊を避けるため overlay を上から重ねる
                    const overlay = document.createElement("div");
                    overlay.id = "lang_select_overlay";
                    overlay.style = `
        position: absolute;
        top: 10%;
        left: 20%;
        background: #1e1e1e;
        padding: 10px;
        border: 1px solid #555;
        z-index: 50;
        display: flex;
        gap: 5px;
      `;
                    overlay.innerHTML = `
        <button data-lang="python" style="width: 45px;">.py</button>
        <button data-lang="javascript" style="width: 45px;">.js</button>
        <button data-lang="html" style="width: 45px;">.html</button>
        <button data-lang="css" style="width: 45px;">.css</button>
        <button data-lang="csv" style="width: 45px;">.csv</button>
      `;

                    // editor の上に重ねる
                    editor_element.appendChild(overlay);

                    document.querySelectorAll("#lang_select_overlay button").forEach(btn => {
                        btn.addEventListener("click", () => {
                            const lang = btn.dataset.lang;
                            let initial_content = "";

                            if (lang === "python") {
                                initial_content = `

        //-------------------------------------------------------- ### Close_Tab ###
        // 全タブ閉鎖時は自動で新規タブを作らず、タブ無し状態を維持する
        // （新規タブはユーザーが [+] を明示的に押したときのみ作成）
        function close_tab(tab_id) {
            // Monaco Editor のモデルを破棄（dispose）する
            if (tabs_data[tab_id] && tabs_data[tab_id].model) {
                // dispose 前にエディタから切り離し、破棄済みモデル参照を防ぐ
                if (editor && editor.getModel() === tabs_data[tab_id].model) {
                    editor.setModel(null);
                }
                // モデルを破棄することで、アンドゥ履歴や内部データ構造がメモリから解放されます
                tabs_data[tab_id].model.dispose();
            }

            // 1. タブのDOM要素を削除
            const tab_element = document.getElementById(tab_id);
            if (tab_element) {
                tab_element.remove();
            }

            // 2. タブの内容（エディタのコンテナ）を削除
            // ※ エディタインスタンス自体はモデル破棄で間接的に解放されることが多いですが、
            // エディタインスタンスも保持している場合は、editor.dispose() も呼び出すのが安全です。
            // 今回のコード構造では model の破棄が最も重要です。
            const editor_container = document.getElementById(`editor-container-${tab_id}`);
            if (editor_container) {
                editor_container.remove();
            }

            // 3. データ構造から情報を削除
            delete tabs_data[tab_id];

            // 4. スプレッドシートインスタンスの破棄
            if (spreadsheet_instances[tab_id]) {
                spreadsheet_instances[tab_id].destroy();
                delete spreadsheet_instances[tab_id];
                const sheet_div = document.getElementById(`sheet_${tab_id}`);
                if (sheet_div) sheet_div.remove();
            }

            // 5. アクティブだったタブを閉じた場合、別のタブを開く or タブ無し状態へ
            if (active_tab_id === tab_id) {
                const remaining_ids = Object.keys(tabs_data);
                if (remaining_ids.length > 0) {
                    // 最後のタブを開く（または隣のタブを開くロジック）
                    activate_tab(remaining_ids[remaining_ids.length - 1]);
                } else {
                    // タブが0枚: 自動で Untitled を作らず、明示的な [+] 操作まで空状態を維持
                    clear_editor_area_when_no_tabs();
                }
            }
        }

        // タブが1枚も無いときの表示・状態の後始末
        function clear_editor_area_when_no_tabs() {
            active_tab_id = null;
            file_name_val = null;

            // 言語選択 UI が残っていれば除去
            const lang_overlay = document.getElementById("lang_select_overlay");
            if (lang_overlay) lang_overlay.remove();
            const lang_box = document.getElementById("lang_select_box");
            if (lang_box) lang_box.remove();

            // プレビュー／プロット／シートは非表示
            // エディタ領域は display:none にしない（flex:1 の高さが潰れ、結果エリアが上に跳ねるのを防ぐ）
            if (preview_container_element) preview_container_element.style.display = "none";
            if (plot_container_element) plot_container_element.style.display = "none";
            if (spreadsheet_container_element) spreadsheet_container_element.style.display = "none";
            if (editor_element) editor_element.style.display = "block";

            // エディタからモデルを外し、空のエディタ領域だけ残す
            if (editor) {
                editor.setModel(null);
                // 表示領域を維持したままレイアウトを再計算
                if (typeof editor.layout === "function") {
                    editor.layout();
                }
            }

            // アウトラインを空にする
            if (typeof render_outline === "function") {
                render_outline([]);
            }
        }

        //-------------------------------------------------------- ### +_Tab ###
        function setup_tab_plus_button() {
            if (tab_plus_button_element) return;
            tab_plus_button_element = document.createElement("div");
            tab_plus_button_element.className = "tab_plus_btn";
            tab_plus_button_element.textContent = "[+]";
            tab_plus_button_element.title = "New_Tab";
            tab_plus_button_element.addEventListener("click", () => { open_tab("Untitled", "") });
            tab_bar_element.appendChild(tab_plus_button_element);
        }

        //-------------------------------------------------------- ### Tab_Drag_And_Drop ###
        function enable_tab_drag_and_drop(tab_element) {
            // ドラッグを有効化
            tab_element.setAttribute("draggable", true);

            // --- ドラッグ開始 ---
            tab_element.addEventListener("dragstart", (e) => {
                dragging_tab_element = tab_element;
                tab_element.classList.add("dragging");
                e.dataTransfer.effectAllowed = "move";
            });

            // --- ドラッグ終了 ---
            tab_element.addEventListener("dragend", () => {
                dragging_tab_element = null;
                tab_element.classList.remove("dragging");
            });

            // --- ドラッグ中に他タブ上に乗った時 ---
            tab_element.addEventListener("dragover", (e) => {
                e.preventDefault(); // dropを許可
                if (!dragging_tab_element || dragging_tab_element === tab_element) return;

                const rect = tab_element.getBoundingClientRect();
                const offset_x = e.clientX - rect.left;

                // 左半分 or 右半分で挿入位置を判断
                if (offset_x < rect.width / 2) {
                    tab_bar_element.insertBefore(dragging_tab_element, tab_element);
                } else {
                    tab_bar_element.insertBefore(dragging_tab_element, tab_element.nextSibling);
                }
            });
        }

        //-------------------------------------------------------- ### File_Explorer_Logic ###
        // ファイルツリーを描画する（ローカルフォルダにも対応）
        function render_file_explorer(tree, type = "drive", target_element) { // target_element 引数を追加
            target_element.innerHTML = ""; // Clear loading message
            const rootUl = create_tree_level(tree, type);
            target_element.appendChild(rootUl);
        }

        //-------------------------------------------------------- ### Script_Explorer 状態ヘルパ ###
        /** Script_Explorer の描画状態を更新して再描画する */
        function set_script_explorer_tree(type, tree) {
            scriptExplorerState = {
                type: type || null,
                tree: Array.isArray(tree) ? tree : null
            };
            // ローカル系へ切り替えたら GitHub 表示フラグを下ろす（呼び出し側の漏れ防止）
            if (type === "local_upload" || type === "local") {
                githubExplorerActive = false;
            }
            if (!scriptExplorerState.tree || scriptExplorerState.tree.length === 0) {
                if (type !== "github") {
                    script_explorer_element.textContent = "Use 'script_dir' to browse local scripts.";
                }
                return;
            }
            // local_upload / local は移動・ヒットテスト用に script_path を付与
            if (type === "local_upload" || type === "local") {
                ensure_script_paths(scriptExplorerState.tree, "");
            }
            render_file_explorer(scriptExplorerState.tree, type, script_explorer_element);
        }

        /**
         * ツリー全ノードに論理パス script_path を付与（ルート名を含む）
         * @param {Array} nodes
         * @param {string} parentPath
         */
        function ensure_script_paths(nodes, parentPath) {
            if (!Array.isArray(nodes)) return;
            for (const node of nodes) {
                if (!node || !node.name) continue;
                node.script_path = parentPath ? `${parentPath}/${node.name}` : node.name;
                if (node.type === "folder") {
                    if (!Array.isArray(node.children)) node.children = [];
                    ensure_script_paths(node.children, node.script_path);
                }
            }
        }

        /** 危険な相対パスを弾く（VFS と同一基準） */
        function normalize_script_relative_path(raw_path) {
            let rel = String(raw_path || "").replace(/\\/g, "/");
            while (rel.startsWith("/")) rel = rel.slice(1);
            if (!rel || rel.split("/").includes("..")) return null;
            return rel;
        }

        /** script_path でノードを検索 */
        function find_script_node_by_path(nodes, targetPath) {
            if (!Array.isArray(nodes) || !targetPath) return null;
            for (const node of nodes) {
                if (node.script_path === targetPath) return node;
                if (node.type === "folder" && node.children) {
                    const found = find_script_node_by_path(node.children, targetPath);
                    if (found) return found;
                }
            }
            return null;
        }

        /**
         * ツリーから script_path 一致ノードを切り離して返す
         * @returns {{ node: object, parentList: Array }|null}
         */
        function detach_script_node_by_path(nodes, targetPath) {
            if (!Array.isArray(nodes) || !targetPath) return null;
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                if (node.script_path === targetPath) {
                    nodes.splice(i, 1);
                    return { node, parentList: nodes };
                }
                if (node.type === "folder" && Array.isArray(node.children)) {
                    const found = detach_script_node_by_path(node.children, targetPath);
                    if (found) return found;
                }
            }
            return null;
        }

        /**
         * 既存サブツリーを handle_map に登録（相対パスキー、マージ用）
         */
        function seed_script_handle_map(nodes, prefix, handle_map) {
            if (!Array.isArray(nodes)) return;
            for (const node of nodes) {
                const key = prefix ? `${prefix}/${node.name}` : node.name;
                handle_map[key] = node;
                if (node.type === "folder" && Array.isArray(node.children)) {
                    seed_script_handle_map(node.children, key, handle_map);
                }
            }
        }

        /**
         * 相対パスをツリーにマージする
         * @param {string} path - ターゲット直下からの相対パス
         * @param {Array} tree - マージ先 children 配列
         * @param {Object} handle_map - path → node
         * @param {File|null} file_object
         * @param {boolean} is_directory - 最終要素をフォルダとして扱うか
         */
        function merge_path_into_script_tree(path, tree, handle_map, file_object, is_directory) {
            if (!path) return;
            const parts = path.split("/").filter(Boolean);
            if (parts.length === 0) return;

            let current_level = tree;
            let current_path = "";

            for (let i = 0; i < parts.length; i++) {
                const part = parts[i];
                current_path = current_path ? `${current_path}/${part}` : part;
                const is_last = (i === parts.length - 1);
                const as_folder = !is_last || is_directory === true;

                let node = handle_map[current_path];
                if (!node) {
                    node = {
                        name: part,
                        type: as_folder ? "folder" : "file",
                        handle: as_folder ? null : file_object,
                        children: as_folder ? [] : undefined
                    };
                    if (!as_folder) {
                        delete node.children;
                    }
                    handle_map[current_path] = node;
                    current_level.push(node);
                } else if (is_last && !as_folder) {
                    // 同名ファイルは上書き（handle 差し替え）
                    node.type = "file";
                    node.handle = file_object;
                    delete node.children;
                } else if (as_folder) {
                    node.type = "folder";
                    if (!Array.isArray(node.children)) node.children = [];
                    // ファイルだったノードをフォルダ化する場合
                    if (node.handle && is_last && is_directory) {
                        node.handle = null;
                    }
                }

                if (node.type === "folder") {
                    if (!Array.isArray(node.children)) node.children = [];
                    current_level = node.children;
                }
            }
        }

        /**
         * ドロップ収集結果を Script ツリーへマージして再描画
         * @param {Array<{relativePath:string, file?:File, isDirectory?:boolean}>} entries
         * @param {string} targetPath - 書き込み先フォルダの script_path（"" = ルート）
         * @returns {number} 追加/更新したファイル数
         */
        function merge_dropped_entries_into_script_tree(entries, targetPath) {
            if (!Array.isArray(entries) || entries.length === 0) return 0;

            // GitHub 表示中は拒否
            if (githubExplorerActive || scriptExplorerState.type === "github") {
                throw new Error("Script drop is disabled while GitHub tree is shown.");
            }

            // 既存ツリーをコピー基準に（無ければ新規）
            let tree = Array.isArray(scriptExplorerState.tree)
                ? scriptExplorerState.tree
                : [];

            // local 等から切り替える場合は local_upload へ
            const dest_path = targetPath ? normalize_script_relative_path(targetPath) : "";
            // dest_path が null で targetPath が非空 → 不正
            if (targetPath && dest_path === null) {
                throw new Error("Invalid drop target path.");
            }

            let target_children = tree;
            if (dest_path) {
                // パスが未付与の可能性に備え再付与
                ensure_script_paths(tree, "");
                const folder = find_script_node_by_path(tree, dest_path);
                if (!folder || folder.type !== "folder") {
                    throw new Error("Drop target folder not found: " + dest_path);
                }
                if (!Array.isArray(folder.children)) folder.children = [];
                target_children = folder.children;
            }

            const handle_map = {};
            // ターゲット直下からの相対キーで既存を seed
            seed_script_handle_map(target_children, "", handle_map);

            let count = 0;
            for (const entry of entries) {
                const rel = normalize_script_relative_path(entry.relativePath || entry.relative_path);
                if (!rel) continue;
                if (entry.isDirectory || entry.is_directory) {
                    merge_path_into_script_tree(rel, target_children, handle_map, null, true);
                    continue;
                }
                if (!entry.file) continue;
                merge_path_into_script_tree(rel, target_children, handle_map, entry.file, false);
                count++;
            }

            // フォルダのみソート（見やすさ）
            sort_script_tree_nodes(tree);
            set_script_explorer_tree("local_upload", tree);
            return count;
        }

        /** フォルダ優先・名前順でツリーをソート */
        function sort_script_tree_nodes(nodes) {
            if (!Array.isArray(nodes)) return;
            nodes.sort((a, b) => {
                if (a.type === b.type) return a.name.localeCompare(b.name);
                return a.type === "folder" ? -1 : 1;
            });
            for (const n of nodes) {
                if (n.type === "folder" && Array.isArray(n.children)) {
                    sort_script_tree_nodes(n.children);
                }
            }
        }

        /**
         * Script_Explorer 内の移動（local_upload のみ）
         */
        function handle_script_move(src_path, dest_folder_path) {
            if (!src_path) return;
            if (scriptExplorerState.type !== "local_upload" || !Array.isArray(scriptExplorerState.tree)) {
                return;
            }
            if (src_path === dest_folder_path) return;

            const tree = scriptExplorerState.tree;
            ensure_script_paths(tree, "");

            const file_name = src_path.split("/").pop();
            const src_parent = src_path.includes("/")
                ? src_path.substring(0, src_path.lastIndexOf("/"))
                : "";
            const dest = dest_folder_path || "";

            // 同一親への移動は無視
            if (src_parent === dest) return;

            // 親を子へ入れる循環を禁止
            const normalized_src = src_path.endsWith("/") ? src_path : src_path + "/";
            if (dest === src_path || (dest && dest.startsWith(normalized_src))) {
                alert("Cannot move a parent folder into its own child.");
                return;
            }

            try {
                const detached = detach_script_node_by_path(tree, src_path);
                if (!detached || !detached.node) {
                    throw new Error("Source item not found: " + src_path);
                }
                const moving = detached.node;

                let dest_children = tree;
                if (dest) {
                    const dest_folder = find_script_node_by_path(tree, dest);
                    if (!dest_folder || dest_folder.type !== "folder") {
                        // 切り離し済みなので戻す
                        detached.parentList.push(moving);
                        throw new Error("Destination folder not found: " + dest);
                    }
                    if (!Array.isArray(dest_folder.children)) dest_folder.children = [];
                    dest_children = dest_folder.children;
                }

                // 同名衝突
                const conflict = dest_children.find((n) => n.name === moving.name);
                if (conflict) {
                    if (!confirm(`"${moving.name}" already exists in destination.\nOverwrite?`)) {
                        // キャンセル時は元の親へ戻す
                        detached.parentList.push(moving);
                        sort_script_tree_nodes(tree);
                        set_script_explorer_tree("local_upload", tree);
                        return;
                    }
                    const idx = dest_children.indexOf(conflict);
                    if (idx >= 0) dest_children.splice(idx, 1);
                }

                dest_children.push(moving);
                sort_script_tree_nodes(tree);
                set_script_explorer_tree("local_upload", tree);
                js_result_area_element.value = `Moved: ${src_path} -> ${dest ? dest + "/" : ""}${file_name}`;
            } catch (err) {
                console.error("Script Move Error:", err);
                alert(`Move Failed: ${err.message}`);
                // 状態が壊れている可能性があるので再描画
                if (scriptExplorerState.tree) {
                    set_script_explorer_tree("local_upload", scriptExplorerState.tree);
                }
            }
        }

        //-------------------------------------------------------- ### Explorer_Selection_Helper ###

        function refresh_script_explorer_view() {

                // GitHub 表示中はホストへツリー再取得を依頼（token は IDE に無い）

                }

                if (scriptExplorerState.tree &&
                    (scriptExplorerState.type === "local_upload" || scriptExplorerState.type === "local")) {
                    set_script_explorer_tree(scriptExplorerState.type, scriptExplorerState.tree);
                    toggle_loading(false);
                    return;
                }

                // ローカル環境: デフォルトメッセージを表示
                scriptExplorerState = { type: null, tree: null };
                script_explorer_element.textContent = "Use 'script_dir' to browse local scripts.";
                toggle_loading(false); // ローディング表示終了

            } catch (err) {

        //-------------------------------------------------------- ### GitHub ファイル読み込み（ホスト経由）
        function load_github_file_content(filePath, fileName) {

                    throw new Error("GitHub file path is empty.");
                }
                js_result_area_element.value = `Loading ${filePath} from GitHub...`;
